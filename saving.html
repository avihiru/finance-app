<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Saving Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d0f14; --surface:#141720; --surface2:#1b1f2a; --surface3:#222636;
      --border:rgba(255,255,255,0.07); --text:#eef0f6; --muted:#6b7280;
      --green:#00d4a0; --green-dim:rgba(0,212,160,0.12);
      --red:#ff5f6d;   --red-dim:rgba(255,95,109,0.10);
      --blue:#4fc3f7;  --blue-dim:rgba(79,195,247,0.10);
      --purple:#818cf8;
      --radius:16px; --radius-sm:10px;
      --shadow:0 4px 24px rgba(0,0,0,0.35);
    }
    [data-theme="light"] {
      --bg:#f0f2f8; --surface:#ffffff; --surface2:#f4f5fb; --surface3:#eaecf4;
      --border:rgba(0,0,0,0.07); --text:#111318; --muted:#7a7f93;
      --shadow:0 4px 24px rgba(0,0,0,0.08);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:3rem; transition:background .3s,color .3s; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up   { animation:fadeUp .5s ease both; }
    .fade-up-1 { animation:fadeUp .5s ease .05s both; }
    .fade-up-2 { animation:fadeUp .5s ease .10s both; }
    .fade-up-3 { animation:fadeUp .5s ease .15s both; }
    .fade-up-4 { animation:fadeUp .5s ease .20s both; }

    /* ── TOPBAR ─── */
    .topbar {
      position:sticky; top:0; z-index:100;
      background:rgba(20,23,32,0.85);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:.75rem 1rem; display:flex; align-items:center;
      justify-content:space-between; gap:.75rem;
    }
    [data-theme="light"] .topbar { background:rgba(255,255,255,0.85); }
    .topbar-brand { display:flex; align-items:center; gap:.6rem; }
    .topbar-brand-icon { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#00d4a0,#4fc3f7); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; box-shadow:0 4px 12px rgba(0,212,160,.3); }
    .topbar-brand h1 { font-size:.95rem; font-weight:700; color:var(--text); }
    .topbar-right { display:flex; align-items:center; gap:.5rem; flex-shrink:0; }
    .btn-nav { display:inline-flex; align-items:center; gap:.3rem; padding:.42rem .8rem; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); font-size:.78rem; font-weight:600; cursor:pointer; text-decoration:none; transition:all .2s; white-space:nowrap; }
    .btn-nav:hover { color:var(--text); border-color:rgba(255,255,255,.15); }
    .btn-back { background:var(--blue-dim); color:var(--blue); border-color:rgba(79,195,247,.25); }
    .btn-back:hover { background:rgba(79,195,247,.2); color:var(--blue); }
    .theme-btn { width:34px; height:34px; border-radius:8px; border:1px solid var(--border); background:var(--surface2); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; transition:all .2s; flex-shrink:0; }

    .content { max-width:520px; margin:0 auto; padding:1.2rem 1rem; }

    /* ── SUMMARY ─── */
    .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; margin-bottom:1rem; }
    .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1rem; position:relative; overflow:hidden; text-align:center; box-shadow:var(--shadow); transition:transform .2s; }
    .summary-card.card-balance { grid-column:1 / -1; padding:1.3rem 1rem; }
    .summary-card:hover { transform:translateY(-2px); }
    .card-glow-line { position:absolute; top:0; left:0; right:0; height:2px; }
    .card-saving  .card-glow-line { background:linear-gradient(90deg,transparent,#00d4a0,transparent); }
    .card-expense .card-glow-line { background:linear-gradient(90deg,transparent,#ff5f6d,transparent); }
    .card-balance .card-glow-line { background:linear-gradient(90deg,transparent,#4fc3f7,transparent); }
    .card-icon  { font-size:1.2rem; margin-bottom:.35rem; }
    .card-label { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.35rem; }
    .card-value { font-size:clamp(1rem,4.5vw,1.35rem); font-weight:800; line-height:1.1; }
    .card-balance .card-value { font-size:clamp(1.3rem,6vw,1.9rem); }
    .card-balance .card-label { font-size:.72rem; }
    .val-green { color:var(--green); }
    .val-red   { color:var(--red); }
    .val-blue  { color:var(--blue); }

    /* ── CHART ─── */
    .chart-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1rem; margin-bottom:1rem; box-shadow:var(--shadow); }
    .section-title { font-size:.8rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:1rem; display:flex; align-items:center; gap:.5rem; }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .chart-legend { display:flex; gap:1rem; margin-bottom:.75rem; flex-wrap:wrap; }
    .legend-item { display:flex; align-items:center; gap:.35rem; font-size:.73rem; color:var(--muted); }
    .legend-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dot-save { background:var(--green); box-shadow:0 0 6px rgba(0,212,160,.6); }
    .dot-exp  { background:var(--red);   box-shadow:0 0 6px rgba(255,95,109,.6); }
    .chart-scroll { overflow-x:auto; padding-bottom:.5rem; }
    .chart-wrap { display:flex; align-items:flex-end; gap:6px; min-width:260px; height:160px; padding-top:1.5rem; }
    .bar-group { display:flex; flex-direction:column; align-items:center; flex:1; min-width:28px; }
    .bar-label { font-size:.62rem; color:var(--muted); margin-top:5px; white-space:nowrap; }
    .bars { display:flex; align-items:flex-end; gap:2px; width:100%; justify-content:center; }
    .bar { width:13px; border-radius:4px 4px 0 0; min-height:3px; transition:height .5s cubic-bezier(.34,1.2,.64,1); }
    .bar.save { background:linear-gradient(to top,#00b386,#00d4a0); }
    .bar.exp  { background:linear-gradient(to top,#e04050,#ff5f6d); }

    /* ── FORM ─── */
    .form-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1rem; margin-bottom:1rem; box-shadow:var(--shadow); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; margin-bottom:.65rem; }
    @media(max-width:400px) { .form-row { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:.3rem; }
    .form-group label { font-size:.72rem; font-weight:600; color:var(--muted); }
    .form-group input { padding:.7rem .85rem; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:.9rem; font-family:inherit; transition:border-color .2s,box-shadow .2s; width:100%; }
    .form-group input:focus { outline:none; border-color:var(--red); box-shadow:0 0 0 3px rgba(255,95,109,.1); }
    .form-group input::placeholder { color:var(--muted); opacity:.6; }
    .btn-add { width:100%; padding:.82rem; border:none; border-radius:var(--radius-sm); background:linear-gradient(90deg,#ff5f6d,#e0404d); color:#fff; font-size:.9rem; font-weight:700; cursor:pointer; transition:all .2s; box-shadow:0 4px 16px rgba(255,95,109,.25); }
    .btn-add:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 6px 22px rgba(255,95,109,.38); }
    .btn-add:active { transform:scale(.98); }
    .btn-add:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    /* ── LIST ─── */
    .list-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1rem; box-shadow:var(--shadow); }
    .filter-tabs { display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap; }
    .ftab { padding:.35rem .8rem; border-radius:99px; border:1px solid var(--border); background:none; color:var(--muted); font-size:.75rem; font-weight:600; cursor:pointer; transition:all .2s; font-family:inherit; }
    .ftab.active         { background:var(--surface3); color:var(--text); border-color:rgba(255,255,255,.15); }
    .ftab.saving.active  { background:var(--green-dim); color:var(--green); border-color:rgba(0,212,160,.3); }
    .ftab.expense.active { background:var(--red-dim);   color:var(--red);   border-color:rgba(255,95,109,.3); }
    .tx-list { list-style:none; }
    .tx-item { display:flex; align-items:center; gap:.75rem; padding:.8rem 0; border-bottom:1px solid var(--border); animation:fadeUp .3s ease both; }
    .tx-item:last-child { border-bottom:none; padding-bottom:0; }
    .tx-icon { width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:.85rem; font-weight:700; flex-shrink:0; }
    .tx-icon.saving  { background:var(--green-dim); color:var(--green); }
    .tx-icon.expense { background:var(--red-dim);   color:var(--red); }
    .tx-info { flex:1; min-width:0; }
    .tx-name { font-size:.88rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tx-meta { font-size:.7rem; color:var(--muted); margin-top:.15rem; }
    .tx-amount { font-size:.9rem; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .tx-amount.saving  { color:var(--green); }
    .tx-amount.expense { color:var(--red); }
    .tx-delete { background:none; border:none; color:var(--muted); cursor:pointer; width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:.8rem; flex-shrink:0; transition:all .2s; }
    .tx-delete:hover { background:var(--red-dim); color:var(--red); }
    .tx-empty { text-align:center; color:var(--muted); padding:2.5rem 0; }
    .tx-empty-icon { font-size:2.5rem; margin-bottom:.6rem; opacity:.4; }
    .tx-empty-text { font-size:.85rem; }

    /* ── SKELETON ─── */
    .skeleton-item { display:flex; align-items:center; gap:.75rem; padding:.8rem 0; border-bottom:1px solid var(--border); }
    .sk { background:var(--surface2); border-radius:6px; animation:skpulse 1.4s ease-in-out infinite; }
    .sk-circle { width:38px; height:38px; border-radius:11px; flex-shrink:0; }
    .sk-lines  { flex:1; display:flex; flex-direction:column; gap:.4rem; }
    .sk-line   { height:10px; }
    .sk-line.w80 { width:80%; } .sk-line.w50 { width:50%; }
    .sk-amount { width:60px; height:14px; flex-shrink:0; }
    @keyframes skpulse { 0%,100%{opacity:.35} 50%{opacity:.7} }

    .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.15); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface); color:var(--text); padding:.65rem 1.4rem; border-radius:99px; font-size:.83rem; font-weight:600; border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,0,0,.4); z-index:999; opacity:0; transition:transform .3s,opacity .3s; white-space:nowrap; }
    .toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast.success { border-color:rgba(0,212,160,.4); color:var(--green); }
    .toast.error   { border-color:rgba(255,95,109,.4); color:var(--red); }

    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:800; display:flex; align-items:center; justify-content:center; padding:1.5rem; opacity:0; pointer-events:none; transition:opacity .2s; backdrop-filter:blur(4px); }
    .overlay.show { opacity:1; pointer-events:all; }
    .dialog { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.5rem; max-width:300px; width:100%; transform:scale(.9); transition:transform .25s; box-shadow:0 24px 64px rgba(0,0,0,.5); }
    .overlay.show .dialog { transform:scale(1); }
    .dialog-icon  { font-size:2rem; text-align:center; margin-bottom:.6rem; }
    .dialog-title { font-size:1rem; font-weight:700; text-align:center; margin-bottom:.4rem; }
    .dialog-msg   { font-size:.82rem; color:var(--muted); text-align:center; margin-bottom:1.2rem; line-height:1.5; }
    .dialog-btns  { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
    .dialog-btn { padding:.7rem; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface2); color:var(--text); font-size:.85rem; font-weight:600; cursor:pointer; transition:all .2s; font-family:inherit; }
    .dialog-btn.confirm { background:var(--red-dim); color:var(--red); border-color:rgba(255,95,109,.3); }
    .dialog-btn:hover { opacity:.8; }

    footer { text-align:center; padding:1.5rem 1rem .5rem; font-size:.72rem; color:var(--muted); margin-top:1rem; border-top:1px solid var(--border); }
  </style>
</head>
<body>
  <header class="topbar fade-up">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">🏦</div>
      <h1>Saving Tracker</h1>
    </div>
    <div class="topbar-right">
      <a href="index.html" class="btn-nav btn-back">← Back</a>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    </div>
  </header>

  <main class="content">
    <!-- Summary -->
    <div class="summary-grid fade-up-1">
      <div class="summary-card card-saving">
        <div class="card-glow-line"></div>
        <div class="card-icon">💰</div>
        <div class="card-label">Total Saved</div>
        <div class="card-value val-green" id="totalSavings">—</div>
      </div>
      <div class="summary-card card-expense">
        <div class="card-glow-line"></div>
        <div class="card-icon">💸</div>
        <div class="card-label">Expenses</div>
        <div class="card-value val-red" id="totalExpenses">—</div>
      </div>
      <div class="summary-card card-balance">
        <div class="card-glow-line"></div>
        <div class="card-icon">🏆</div>
        <div class="card-label">Balance</div>
        <div class="card-value val-blue" id="netBalance">—</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-card fade-up-2">
      <div class="section-title">Monthly Overview</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot dot-save"></div>Savings</div>
        <div class="legend-item"><div class="legend-dot dot-exp"></div>Expenses</div>
      </div>
      <div class="chart-scroll">
        <div class="chart-wrap" id="chart">
          <div class="skeleton-item" style="width:100%;border:none;justify-content:center;gap:8px">
            <div class="sk" style="width:20px;height:80px;border-radius:4px 4px 0 0"></div>
            <div class="sk" style="width:20px;height:120px;border-radius:4px 4px 0 0"></div>
            <div class="sk" style="width:20px;height:60px;border-radius:4px 4px 0 0"></div>
            <div class="sk" style="width:20px;height:100px;border-radius:4px 4px 0 0"></div>
            <div class="sk" style="width:20px;height:90px;border-radius:4px 4px 0 0"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Form -->
    <div class="form-card fade-up-3">
      <div class="section-title">Add Expense</div>
      <div class="form-row">
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="desc" placeholder="e.g. Groceries" />
        </div>
        <div class="form-group">
          <label>Amount (Rs.)</label>
          <input type="number" id="amt" step="0.01" min="0.01" placeholder="0.00" />
        </div>
      </div>
      <button class="btn-add" id="addBtn" onclick="submitAdd()">− Add Expense</button>
    </div>

    <!-- List -->
    <div class="list-card fade-up-4">
      <div class="section-title">Transactions</div>
      <div class="filter-tabs">
        <button class="ftab active"          onclick="setFilter(this,'all')">All</button>
        <button class="ftab saving"          onclick="setFilter(this,'saving')">Savings</button>
        <button class="ftab expense"         onclick="setFilter(this,'expense')">Expenses</button>
      </div>
      <ul class="tx-list" id="txList">
        <li>
          <div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div>
          <div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div>
        </li>
      </ul>
    </div>
  </main>

  <footer>© All rights reserved. A product by <strong>Avishka Batapola</strong>.</footer>
  <div class="toast" id="toast"></div>

  <div class="overlay" id="overlay">
    <div class="dialog">
      <div class="dialog-icon">🗑️</div>
      <div class="dialog-title">Delete Record?</div>
      <div class="dialog-msg" id="dialogMsg">This action cannot be undone.</div>
      <div class="dialog-btns">
        <button class="dialog-btn"         onclick="closeDialog()">Cancel</button>
        <button class="dialog-btn confirm" id="dialogConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="db.js"></script>
  <script>
    if (sessionStorage.getItem('ft_auth') !== 'true') { location.replace('login.html'); }

    var allTransactions = [];
    var activeFilter    = 'all';

    // ── Theme ─────────────────────────────────────────────
    var theme = 'dark';
    try { theme = localStorage.getItem('ft-theme') || 'dark'; } catch(e){}
    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
      try { localStorage.setItem('ft-theme', t); } catch(e){}
    }
    applyTheme(theme);
    function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }

    function fmt(n) { return 'Rs.' + parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast '+(type||'success')+' show';
      setTimeout(function(){ t.className='toast'; }, 3000);
    }

    // ── Dialog ────────────────────────────────────────────
    var pendingId = null;
    function confirmDelete(id, desc) {
      pendingId = id;
      document.getElementById('dialogMsg').textContent = '"'+desc+'"';
      document.getElementById('overlay').classList.add('show');
      document.getElementById('dialogConfirm').onclick = doDelete;
    }
    function closeDialog() {
      pendingId = null;
      document.getElementById('overlay').classList.remove('show');
    }
    document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) closeDialog(); });
    function doDelete() {
      if (!pendingId) return;
      var id = pendingId; closeDialog();
      FinanceDB.deleteSaving(id).then(function(data) {
        if (data.success) { showToast('Deleted.','success'); loadData(); }
        else showToast('Delete failed.','error');
      }).catch(function(err){ showToast('Error: '+err.message,'error'); });
    }

    // ── Filter ────────────────────────────────────────────
    function setFilter(btn, filter) {
      activeFilter = filter;
      document.querySelectorAll('.ftab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      renderList();
    }

    // ── Load ──────────────────────────────────────────────
    function loadData() {
      FinanceDB.getSavingData().then(function(data) {
        document.getElementById('totalSavings').textContent  = fmt(data.total_savings);
        document.getElementById('totalExpenses').textContent = fmt(data.total_expenses);
        document.getElementById('netBalance').textContent    = fmt(data.net_balance);
        renderChart(data.monthly || {});
        allTransactions = data.transactions || [];
        renderList();
      }).catch(function(err){
        document.getElementById('txList').innerHTML = '<li class="tx-empty"><div class="tx-empty-icon">⚠️</div><div class="tx-empty-text">Error loading data.</div></li>';
        console.error(err);
      });
    }

    // ── Chart ─────────────────────────────────────────────
    function renderChart(monthly) {
      var chart   = document.getElementById('chart');
      var entries = Object.entries(monthly);
      if (!entries.length) { chart.innerHTML = '<div style="color:var(--muted);font-size:.8rem;width:100%;text-align:center">No data yet.</div>'; return; }
      var maxVal = entries.reduce(function(m,e){ return Math.max(m, e[1].saving||0, e[1].expense||0); }, 0);
      var maxH   = 130;
      chart.innerHTML = entries.map(function(e) {
        var sh = maxVal > 0 ? Math.max(3, Math.round(((e[1].saving||0)/maxVal)*maxH)) : 3;
        var eh = maxVal > 0 ? Math.max(3, Math.round(((e[1].expense||0)/maxVal)*maxH)) : 3;
        return '<div class="bar-group">' +
          '<div class="bars">' +
            '<div class="bar save" style="height:'+sh+'px" title="Saved: '+fmt(e[1].saving||0)+'"></div>' +
            '<div class="bar exp"  style="height:'+eh+'px" title="Spent: '+fmt(e[1].expense||0)+'"></div>' +
          '</div>' +
          '<div class="bar-label">'+esc(e[0])+'</div>' +
        '</div>';
      }).join('');
    }

    // ── Render list ───────────────────────────────────────
    function renderList() {
      var list     = document.getElementById('txList');
      var filtered = activeFilter === 'all' ? allTransactions : allTransactions.filter(function(t){ return t.state === activeFilter; });
      if (!filtered.length) {
        list.innerHTML = '<li class="tx-empty"><div class="tx-empty-icon">'+(activeFilter==='saving'?'💰':activeFilter==='expense'?'💸':'📋')+'</div><div class="tx-empty-text">No records found.</div></li>';
        return;
      }
      list.innerHTML = filtered.map(function(t, i) {
        var isSaving = t.state === 'saving';
        var delay    = Math.min(i * 0.04, 0.4);
        return '<li class="tx-item" style="animation-delay:'+delay+'s">' +
          '<div class="tx-icon '+esc(t.state)+'">'+(isSaving?'↑':'↓')+'</div>' +
          '<div class="tx-info">' +
            '<div class="tx-name">'+esc(t.description)+'</div>' +
            '<div class="tx-meta">'+esc(t.date||'')+'</div>' +
          '</div>' +
          '<div class="tx-amount '+esc(t.state)+'">'+(isSaving?'+':'−')+fmt(t.amount)+'</div>' +
          '<button class="tx-delete" onclick="confirmDelete(\''+esc(t.id)+'\',\''+esc(t.description)+'\')" title="Delete">✕</button>' +
        '</li>';
      }).join('');
    }

    // ── Add ───────────────────────────────────────────────
    function submitAdd() {
      var desc = document.getElementById('desc').value.trim();
      var amt  = document.getElementById('amt').value;
      if (!desc)                        { showToast('Please enter a description.','error'); return; }
      if (!amt||parseFloat(amt) <= 0)   { showToast('Enter a valid amount.','error'); return; }
      var btn  = document.getElementById('addBtn');
      var orig = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';
      FinanceDB.addSavingExpense(desc, amt).then(function(data) {
        if (data.success) {
          showToast('Expense added!','success');
          document.getElementById('desc').value = '';
          document.getElementById('amt').value  = '';
          loadData();
        } else {
          showToast(data.message||'Error.','error');
        }
      }).catch(function(err){
        showToast('Error: '+err.message,'error');
      }).finally(function(){
        btn.disabled = false; btn.textContent = orig;
      });
    }

    // ── Init ──────────────────────────────────────────────
    FinanceDB.init().then(function(){ return FinanceDB.seedIfEmpty(); }).then(function(){ loadData(); }).catch(function(err){ console.error('DB init error:', err); });
  </script>
</body>
</html>
