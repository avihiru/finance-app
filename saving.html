<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Saving Tracker</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#f3f4f8; --surface:#ffffff; --surface2:#f0f1f5; --border:#e2e5ec;
      --text:#1a1d27; --muted:#7a7f93; --green:#10b981; --red:#ef4444;
      --purple:#6366f1; --radius:14px; --radius-sm:8px; --shadow:0 2px 12px rgba(0,0,0,0.07);
    }
    [data-theme="dark"] {
      --bg:#111318; --surface:#1c1f27; --surface2:#242831;
      --border:rgba(255,255,255,0.08); --text:#e8eaf0; --muted:#8a8f9e;
      --shadow:0 2px 12px rgba(0,0,0,0.3);
    }
    body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:2rem; transition:background 0.25s,color 0.25s; }
    .topbar { position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:0.8rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.75rem;box-shadow:var(--shadow); }
    .topbar h1{font-size:1rem;font-weight:700;color:var(--purple);white-space:nowrap}
    .topbar-right{display:flex;align-items:center;gap:0.6rem;flex-shrink:0}
    .btn-nav{display:inline-flex;align-items:center;gap:0.3rem;padding:0.4rem 0.8rem;border-radius:8px;border:none;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity 0.2s}
    .btn-back{background:rgba(99,102,241,0.15);color:var(--purple)}
    .btn-nav:hover{opacity:0.85}
    .theme-toggle{display:flex;align-items:center;gap:0.4rem}
    .theme-label{font-size:0.75rem;color:var(--muted)}
    .switch{position:relative;width:46px;height:24px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .slider-track{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:background 0.3s}
    .switch input:checked ~ .slider-track{background:var(--purple)}
    .slider-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:var(--surface);border-radius:50%;transition:transform 0.3s;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:10px}
    .switch input:checked ~ .slider-thumb{transform:translateX(22px)}
    .content{max-width:900px;margin:0 auto;padding:1rem}
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1.25rem}
    @media(max-width:420px){.summary-grid{grid-template-columns:1fr}}
    .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 0.9rem;text-align:center;box-shadow:var(--shadow)}
    .summary-card .label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem}
    .summary-card .value{font-size:clamp(0.95rem,3.5vw,1.45rem);font-weight:700;word-break:break-all}
    .value.green{color:var(--green)}.value.red{color:var(--red)}.value.purple{color:var(--purple)}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
    .section-title{font-size:0.9rem;font-weight:700;color:var(--text);margin-bottom:1rem;padding-bottom:0.6rem;border-bottom:1px solid var(--border)}
    .chart-legend{display:flex;gap:1rem;margin-bottom:0.75rem;flex-wrap:wrap}
    .legend-item{display:flex;align-items:center;gap:0.35rem;font-size:0.75rem;color:var(--muted)}
    .legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .dot-save{background:var(--green)}.dot-expense{background:var(--red)}
    .chart-scroll{overflow-x:auto;padding-bottom:0.5rem}
    .chart-wrap{display:flex;align-items:flex-end;gap:4px;min-width:280px;height:180px;padding-top:2rem}
    .bar-group{display:flex;flex-direction:column;align-items:center;flex:1;min-width:28px}
    .bar-label{font-size:0.65rem;color:var(--muted);margin-top:4px;white-space:nowrap}
    .bars{display:flex;align-items:flex-end;gap:2px;width:100%;justify-content:center}
    .bar{width:12px;border-radius:3px 3px 0 0;min-height:3px;transition:height 0.4s ease}
    .bar.save{background:var(--green)}.bar.expense{background:var(--red)}
    .form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1rem;margin-bottom:1.25rem;box-shadow:var(--shadow)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem}
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}
    .form-group{display:flex;flex-direction:column;gap:0.3rem}
    .form-group label{font-size:0.78rem;color:var(--muted);font-weight:500}
    .form-group input{padding:0.65rem 0.85rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.95rem;width:100%}
    .form-group input:focus{outline:none;border-color:var(--purple)}
    .btn-add{width:100%;padding:0.8rem;border:none;border-radius:var(--radius-sm);background:var(--purple);color:white;font-size:0.95rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s}
    .btn-add:hover{opacity:0.88;transform:translateY(-1px)}.btn-add:active{transform:scale(0.98)}
    .filter-tabs{display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap}
    .ftab{padding:0.4rem 0.9rem;border-radius:20px;border:1px solid var(--border);background:none;color:var(--muted);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.2s}
    .ftab.active{background:var(--purple);color:white;border-color:var(--purple)}
    .tx-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1rem;box-shadow:var(--shadow)}
    .tx-list{list-style:none}
    .tx-item{display:flex;align-items:center;gap:0.75rem;padding:0.85rem 0;border-bottom:1px solid var(--border)}
    .tx-item:last-child{border-bottom:none}
    .tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;font-weight:700;flex-shrink:0}
    .tx-icon.saving{background:rgba(16,185,129,0.12);color:var(--green)}.tx-icon.expense{background:rgba(239,68,68,0.12);color:var(--red)}
    .tx-info{flex:1;min-width:0}
    .tx-name{font-size:0.9rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-date{font-size:0.72rem;color:var(--muted);margin-top:0.15rem}
    .tx-amount{font-size:0.92rem;font-weight:700;white-space:nowrap;flex-shrink:0}
    .tx-amount.saving{color:var(--green)}.tx-amount.expense{color:var(--red)}
    .tx-delete{background:none;border:none;color:var(--muted);cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;flex-shrink:0;transition:background 0.2s,color 0.2s}
    .tx-delete:hover{background:rgba(239,68,68,0.12);color:var(--red)}
    .tx-empty{text-align:center;color:var(--muted);padding:2rem 0;font-size:0.9rem;font-style:italic}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-row{text-align:center;padding:2rem 0;color:var(--muted)}
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);color:var(--text);padding:0.7rem 1.4rem;border-radius:50px;font-size:0.88rem;font-weight:600;border:1px solid var(--border);box-shadow:var(--shadow);z-index:999;opacity:0;transition:transform 0.3s,opacity 0.3s;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}.toast.success{border-color:var(--green);color:var(--green)}.toast.error{border-color:var(--red);color:var(--red)}
    footer{text-align:center;padding:1.5rem 1rem 0.5rem;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--border);margin-top:1.5rem}
  </style>
</head>
<body>
  <header class="topbar">
    <h1>🏦 Saving Tracker</h1>
    <div class="topbar-right">
      <a href="index.html" class="btn-nav btn-back">← Back</a>
      <div class="theme-toggle">
        <span class="theme-label">Dark</span>
        <label class="switch">
          <input type="checkbox" id="themeToggle" />
          <div class="slider-track"></div>
          <div class="slider-thumb" id="themeIcon">🌙</div>
        </label>
      </div>
    </div>
  </header>

  <main class="content">
    <div class="summary-grid">
      <div class="summary-card"><div class="label">Total Savings</div><div class="value green" id="totalSavings">—</div></div>
      <div class="summary-card"><div class="label">Total Expenses</div><div class="value red" id="totalExpenses">—</div></div>
      <div class="summary-card"><div class="label">Net Balance</div><div class="value purple" id="netBalance">—</div></div>
    </div>

    <div class="chart-card">
      <div class="section-title">Monthly Overview</div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot dot-save"></div> Savings</div>
        <div class="legend-item"><div class="legend-dot dot-expense"></div> Expenses</div>
      </div>
      <div class="chart-scroll">
        <div class="chart-wrap" id="chart"><div class="loading-row"><span class="spinner"></span></div></div>
      </div>
    </div>

    <div class="form-card">
      <div class="section-title">Add New Expense</div>
      <div class="form-row">
        <div class="form-group">
          <label for="desc">Description</label>
          <input type="text" id="desc" placeholder="e.g. Groceries" />
        </div>
        <div class="form-group">
          <label for="amt">Amount (Rs.)</label>
          <input type="number" id="amt" step="0.01" min="0.01" placeholder="0.00" />
        </div>
      </div>
      <button class="btn-add" id="addBtn" onclick="submitAdd()">Add Expense</button>
    </div>

    <div class="tx-card">
      <div class="section-title">Recent Transactions</div>
      <div class="filter-tabs">
        <button class="ftab active" data-filter="all">All</button>
        <button class="ftab" data-filter="saving">Savings</button>
        <button class="ftab" data-filter="expense">Expenses</button>
      </div>
      <ul class="tx-list" id="txList">
        <li class="loading-row"><span class="spinner"></span> Loading…</li>
      </ul>
    </div>
  </main>

  <footer>© All rights reserved. A product by <strong>Avishka Batapola</strong>.</footer>
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="db.js"></script>
  <script>
    // Auth guard
    if (sessionStorage.getItem('ft_auth') !== 'true') {
      location.replace('login.html');
    }

    var allTransactions = [];
    var activeFilter    = 'all';

    function fmt(n) {
      return 'Rs.' + parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type||'success') + ' show';
      setTimeout(function(){ t.className='toast'; }, 3000);
    }

    // Theme
    var toggle    = document.getElementById('themeToggle');
    var themeIcon = document.getElementById('themeIcon');
    var savedTheme = 'dark';
    try { savedTheme = localStorage.getItem('sv-theme') || 'dark'; } catch(e) {}
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      toggle.checked        = (t==='dark');
      themeIcon.textContent = (t==='dark') ? '🌙' : '☀️';
      try { localStorage.setItem('sv-theme', t); } catch(e) {}
    }
    applyTheme(savedTheme);
    toggle.addEventListener('change', function(){ applyTheme(toggle.checked ? 'dark' : 'light'); });

    // Load saving data from IndexedDB
    function loadData() {
      FinanceDB.getSavingData().then(function(data) {
        document.getElementById('totalSavings').textContent  = fmt(data.total_savings);
        document.getElementById('totalExpenses').textContent = fmt(data.total_expenses);
        document.getElementById('netBalance').textContent    = fmt(data.net_balance);
        renderChart(data.monthly || {});
        allTransactions = data.transactions || [];
        renderList();
      }).catch(function(err) {
        document.getElementById('txList').innerHTML = '<li class="tx-empty">Error loading data.</li>';
        console.error(err);
      });
    }

    // Render bar chart
    function renderChart(monthly) {
      var chart   = document.getElementById('chart');
      var entries = Object.entries(monthly);
      if (!entries.length) {
        chart.innerHTML = '<div class="loading-row" style="font-size:0.8rem">No data yet.</div>';
        return;
      }
      var maxVal = entries.reduce(function(m,e){ return Math.max(m, e[1].saving||0, e[1].expense||0); }, 0);
      var maxH   = 140;
      chart.innerHTML = entries.map(function(e) {
        var sh = maxVal>0 ? Math.max(3, Math.round(((e[1].saving||0)/maxVal)*maxH)) : 3;
        var eh = maxVal>0 ? Math.max(3, Math.round(((e[1].expense||0)/maxVal)*maxH)) : 3;
        return '<div class="bar-group">' +
          '<div class="bars">' +
            '<div class="bar save" style="height:' + sh + 'px" title="Saving: ' + fmt(e[1].saving) + '"></div>' +
            '<div class="bar expense" style="height:' + eh + 'px" title="Expense: ' + fmt(e[1].expense) + '"></div>' +
          '</div>' +
          '<div class="bar-label">' + escHtml(e[0]) + '</div>' +
        '</div>';
      }).join('');
    }

    // Render transaction list
    function renderList() {
      var list     = document.getElementById('txList');
      var filtered = activeFilter==='all'
        ? allTransactions
        : allTransactions.filter(function(t){ return t.state===activeFilter; });
      if (!filtered.length) {
        list.innerHTML = '<li class="tx-empty">No records found.</li>';
        return;
      }
      list.innerHTML = filtered.map(function(t) {
        var isSaving = t.state==='saving';
        return '<li class="tx-item" data-type="' + t.state + '">' +
          '<div class="tx-icon ' + t.state + '">' + (isSaving ? '↑' : '↓') + '</div>' +
          '<div class="tx-info">' +
            '<div class="tx-name">' + escHtml(t.description) + '</div>' +
            '<div class="tx-date">' + escHtml(t.date||'') + '</div>' +
          '</div>' +
          '<div class="tx-amount ' + t.state + '">' + (isSaving ? '+' : '−') + fmt(t.amount) + '</div>' +
          '<button class="tx-delete" onclick="deleteTx(\'' + t.id + '\')" title="Delete">✕</button>' +
        '</li>';
      }).join('');
    }

    // Filter tabs
    document.querySelectorAll('.ftab').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.ftab').forEach(function(b){ b.classList.remove('active'); });
        this.classList.add('active');
        activeFilter = this.dataset.filter;
        renderList();
      });
    });

    // Add expense to IndexedDB
    function submitAdd() {
      var desc   = document.getElementById('desc').value.trim();
      var amount = document.getElementById('amt').value;
      if (!desc)                          { showToast('Please enter a description.','error'); return; }
      if (!amount||parseFloat(amount)<=0) { showToast('Enter a valid amount.','error'); return; }

      var btn  = document.getElementById('addBtn');
      var orig = btn.textContent;
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      FinanceDB.addSavingExpense(desc, amount).then(function(data) {
        if (data.success) {
          showToast('Transaction added!','success');
          document.getElementById('desc').value = '';
          document.getElementById('amt').value  = '';
          loadData();
        } else {
          showToast(data.message||'Error.','error');
        }
      }).catch(function(err){
        showToast('Error: '+err.message,'error');
      }).finally(function(){
        btn.disabled=false; btn.textContent=orig;
      });
    }

    // Delete from IndexedDB
    function deleteTx(id) {
      if (!confirm('Delete this transaction?')) return;
      FinanceDB.deleteSaving(id).then(function(data) {
        if (data.success) { showToast('Deleted.','success'); loadData(); }
        else showToast('Delete failed.','error');
      }).catch(function(err){ showToast('Error: '+err.message,'error'); });
    }

    // Init
    FinanceDB.init().then(function(){
      return FinanceDB.seedIfEmpty();
    }).then(function(){
      loadData();
    }).catch(function(err){ console.error('DB init error:', err); });
  </script>
</body>
</html>
