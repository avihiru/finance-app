<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d0f14; --surface:#141720; --surface2:#1b1f2a;
      --border:rgba(255,255,255,0.07); --text:#eef0f6; --muted:#6b7280;
      --green:#00d4a0; --green-dim:rgba(0,212,160,0.12);
      --blue:#4fc3f7; --red:#ff5f6d;
      --radius:16px; --radius-sm:10px;
    }
    body {
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; align-items:center;
      justify-content:center; padding:1.5rem; overflow:hidden;
    }

    /* ── SPLASH ─────────────────────────────────────────── */
    #splash {
      position:fixed; inset:0; z-index:9000; background:var(--bg);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:24px;
      transition:opacity 0.6s ease, transform 0.6s ease;
    }
    #splash.out { opacity:0; transform:scale(1.03); pointer-events:none; }

    .sp-blob { position:absolute; border-radius:50%; pointer-events:none; filter:blur(80px); }
    .sp-b1 { width:400px;height:400px;background:rgba(0,212,160,0.14);top:-100px;left:-100px;animation:bm1 10s ease-in-out infinite; }
    .sp-b2 { width:320px;height:320px;background:rgba(79,195,247,0.10);bottom:-80px;right:-80px;animation:bm2 12s ease-in-out infinite; }
    @keyframes bm1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,35px)}}
    @keyframes bm2{0%,100%{transform:translate(0,0)}50%{transform:translate(-35px,-45px)}}

    .sp-grid {
      position:absolute;inset:0;pointer-events:none;
      background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);
      background-size:60px 60px;
    }

    .sp-icon-wrap { position:relative; margin-bottom:40px; animation:iconIn 0.9s cubic-bezier(.34,1.56,.64,1) both; }
    @keyframes iconIn{from{opacity:0;transform:scale(.3) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .sp-ring { position:absolute; border-radius:50%; animation:rp 3s ease-in-out infinite; }
    .sp-r1{inset:-14px;border:1px solid rgba(0,212,160,.30);animation-delay:0s}
    .sp-r2{inset:-28px;border:1px solid rgba(79,195,247,.14);animation-delay:.4s}
    .sp-r3{inset:-44px;border:1px solid rgba(0,212,160,.06);animation-delay:.8s}
    @keyframes rp{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    .sp-icon {
      width:110px;height:110px;
      background:linear-gradient(135deg,#00d4a0 0%,#00b386 50%,#4fc3f7 100%);
      border-radius:28px;display:flex;align-items:center;justify-content:center;
      position:relative;overflow:hidden;
      box-shadow:0 0 60px rgba(0,212,160,.45),0 20px 50px rgba(0,0,0,.6);
      animation:iglow 3.5s ease-in-out infinite;
    }
    @keyframes iglow{0%,100%{box-shadow:0 0 60px rgba(0,212,160,.45),0 20px 50px rgba(0,0,0,.6)}50%{box-shadow:0 0 80px rgba(0,212,160,.65),0 20px 50px rgba(0,0,0,.6)}}
    .sp-icon::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%)}
    .sp-icon-emoji{font-size:50px;position:relative;z-index:2;animation:emojiFloat 3s ease-in-out infinite}
    @keyframes emojiFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

    .sp-name {
      font-size:42px;font-weight:800;letter-spacing:-1.5px;
      background:linear-gradient(135deg,#eef0f6 20%,#00d4a0 60%,#4fc3f7 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:6px;animation:slideUp 0.8s cubic-bezier(.34,1.2,.64,1) 0.2s both;
    }
    .sp-sub{font-size:11px;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;animation:slideUp .8s ease .38s both}
    .sp-author{font-size:11px;color:rgba(107,114,128,.5);margin-bottom:48px;animation:slideUp .8s ease .48s both}
    .sp-author span{color:var(--green);font-weight:600}
    @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    .sp-pills{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:48px;animation:slideUp .8s ease .58s both}
    .sp-pill{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;background:rgba(255,255,255,.035);border:.5px solid rgba(255,255,255,.07);font-size:10.5px;color:var(--muted)}
    .pd{width:6px;height:6px;border-radius:50%}
    .pd-g{background:#00d4a0;box-shadow:0 0 6px rgba(0,212,160,.9)}
    .pd-b{background:#4fc3f7;box-shadow:0 0 6px rgba(79,195,247,.9)}
    .pd-r{background:#ff5f6d;box-shadow:0 0 6px rgba(255,95,109,.9)}
    .pd-y{background:#fbbf24;box-shadow:0 0 6px rgba(251,191,36,.9)}

    .sp-loader{display:flex;flex-direction:column;align-items:center;gap:10px;animation:slideUp .8s ease .75s both}
    .sp-bar{width:150px;height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
    .sp-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:99px;animation:lw 2.2s cubic-bezier(.4,0,.2,1) forwards}
    @keyframes lw{0%{width:0%}60%{width:72%}85%{width:90%}100%{width:100%}}
    .sp-ltxt{font-size:9px;color:rgba(107,114,128,.35);font-family:monospace;letter-spacing:3px}
    .sp-dots{display:flex;gap:6px}
    .sp-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.10);animation:da 1.5s ease-in-out infinite}
    .sp-dot:nth-child(1){animation-delay:0s}.sp-dot:nth-child(2){animation-delay:.25s}.sp-dot:nth-child(3){animation-delay:.5s}
    @keyframes da{0%,80%,100%{background:rgba(255,255,255,.10);transform:scale(1)}40%{background:var(--green);transform:scale(1.6)}}

    /* ── LOGIN CARD ──────────────────────────────────────── */
    #app{width:100%;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(12px);transition:opacity .5s ease,transform .5s ease}
    #app.on{opacity:1;transform:translateY(0)}

    .login-wrap { width:100%; max-width:360px; }

    .login-logo { text-align:center; margin-bottom:2.2rem; }
    .login-logo-icon {
      display:inline-flex;align-items:center;justify-content:center;
      width:72px;height:72px;border-radius:20px;
      background:linear-gradient(135deg,#00d4a0,#4fc3f7);
      font-size:36px; margin-bottom:1rem;
      box-shadow:0 8px 30px rgba(0,212,160,.3);
      animation:logoBounce .6s cubic-bezier(.34,1.56,.64,1) .1s both;
    }
    @keyframes logoBounce{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
    .login-logo h1{font-size:1.5rem;font-weight:800;letter-spacing:-.5px;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .login-logo p{font-size:.75rem;color:var(--muted);margin-top:.3rem}

    .login-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:2rem 1.75rem 1.75rem;
      box-shadow:0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03);
      animation:cardIn .6s cubic-bezier(.34,1.2,.64,1) .2s both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    .field { margin-bottom:1.1rem; }
    .field label{display:block;font-size:.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem}
    .input-wrap{position:relative}
    .input-wrap input {
      width:100%;padding:.8rem 2.6rem .8rem 1rem;
      border-radius:var(--radius-sm);
      border:1px solid var(--border);
      background:var(--surface2);
      color:var(--text);font-size:.95rem;
      transition:border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(0,212,160,.12)}
    .input-wrap input::placeholder{color:var(--muted);opacity:.6}
    .eye-btn{position:absolute;right:.7rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem;line-height:1;transition:color .2s}
    .eye-btn:hover{color:var(--text)}

    .btn-login {
      width:100%;padding:.88rem;margin-top:.5rem;
      border:none;border-radius:var(--radius-sm);
      background:linear-gradient(90deg,#00d4a0,#00b882);
      color:#062e1f;font-size:.95rem;font-weight:700;
      cursor:pointer;letter-spacing:.02em;
      transition:opacity .2s, transform .15s, box-shadow .2s;
      box-shadow:0 4px 20px rgba(0,212,160,.3);
    }
    .btn-login:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 28px rgba(0,212,160,.42)}
    .btn-login:active{transform:scale(.98)}
    .btn-login:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}

    .error-msg {
      display:none;margin-top:.85rem;
      background:rgba(255,95,109,.08);border:1px solid rgba(255,95,109,.25);
      color:var(--red);border-radius:var(--radius-sm);
      padding:.6rem .9rem;font-size:.82rem;text-align:center;
      animation:shake .4s ease;
    }
    .error-msg.show{display:block}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(6,46,31,.25);border-top-color:#062e1f;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}

    .login-footer{text-align:center;margin-top:1.5rem;font-size:.7rem;color:rgba(107,114,128,.4)}
    .cloud-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,212,160,.08);border:1px solid rgba(0,212,160,.2);color:var(--green);border-radius:99px;padding:3px 10px;font-size:.7rem;font-weight:600;margin-top:.4rem}
  </style>
</head>
<body>

  <div id="splash">
    <div class="sp-blob sp-b1"></div>
    <div class="sp-blob sp-b2"></div>
    <div class="sp-grid"></div>
    <div class="sp-icon-wrap">
      <div class="sp-ring sp-r3"></div>
      <div class="sp-ring sp-r2"></div>
      <div class="sp-ring sp-r1"></div>
      <div class="sp-icon"><span class="sp-icon-emoji">💰</span></div>
    </div>
    <div class="sp-name">Finance Tracker</div>
    <div class="sp-sub">Personal Finance Manager</div>
    <div class="sp-author">by <span>Avishka Batapola</span></div>
    <div class="sp-pills">
      <div class="sp-pill"><span class="pd pd-g"></span>Income &amp; Expenses</div>
      <div class="sp-pill"><span class="pd pd-b"></span>Analytics</div>
      <div class="sp-pill"><span class="pd pd-y"></span>Budget Tracking</div>
      <div class="sp-pill"><span class="pd pd-r"></span>Cloud Sync</div>
    </div>
    <div class="sp-loader">
      <div class="sp-bar"><div class="sp-fill"></div></div>
      <div class="sp-ltxt">LOADING</div>
      <div class="sp-dots">
        <div class="sp-dot"></div><div class="sp-dot"></div><div class="sp-dot"></div>
      </div>
    </div>
  </div>

  <div id="app">
    <div class="login-wrap">
      <div class="login-logo">
        <div class="login-logo-icon">💰</div>
        <h1>Finance Tracker</h1>
        <p>by Avishka Batapola</p>
        <div class="cloud-badge">☁️ Cloud Sync — Firebase</div>
      </div>
      <div class="login-card">
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="Enter username" autocomplete="username" autocapitalize="none" spellcheck="false" />
          </div>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
            <button class="eye-btn" type="button" onclick="togglePass()" title="Show/hide">👁</button>
          </div>
        </div>
        <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
        <div class="error-msg" id="errMsg">Incorrect username or password.</div>
      </div>
      <div class="login-footer">© Avishka Batapola. All rights reserved.</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="db.js"></script>
  <script>
    const USERS = [
      { username: 'admin',   password: 'admin123' },
      { username: 'avishka', password: '16724' }
    ];

    window.addEventListener('DOMContentLoaded', function () {
      FinanceDB.init().catch(function(){});
      if (sessionStorage.getItem('ft_auth') === 'true') {
        location.replace('index.html'); return;
      }
      setTimeout(function () {
        var splash = document.getElementById('splash');
        splash.classList.add('out');
        setTimeout(function () {
          splash.style.display = 'none';
          document.getElementById('app').classList.add('on');
        }, 620);
      }, 2300);
    });

    document.addEventListener('DOMContentLoaded', function(){
      document.getElementById('username').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('password').focus(); });
      document.getElementById('password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
    });

    function togglePass() {
      var inp = document.getElementById('password');
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function doLogin() {
      var uname = document.getElementById('username').value.trim();
      var pword = document.getElementById('password').value;
      var btn   = document.getElementById('loginBtn');
      var err   = document.getElementById('errMsg');
      err.classList.remove('show');
      var match = USERS.find(function(u){ return u.username===uname && u.password===pword; });
      if (match) {
        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span> Signing in…';
        sessionStorage.setItem('ft_auth', 'true');
        sessionStorage.setItem('ft_user', uname);
        setTimeout(function(){ location.replace('index.html'); }, 600);
      } else {
        err.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
</body>
</html>
