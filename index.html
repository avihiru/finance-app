<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Income & Expense Tracker</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#111318; --surface:#1c1f27; --surface2:#242831;
      --border:rgba(255,255,255,0.08); --text:#e8eaf0; --muted:#8a8f9e;
      --green:#00d4a0; --red:#ff5f6d; --blue:#4fc3f7; --accent:#00d4a0;
      --radius:14px; --radius-sm:8px;
    }
    body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:2rem; }
    .topbar { position:sticky;top:0;z-index:100;background:rgba(17,19,24,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0.85rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:0.75rem; }
    .topbar h1 { font-size:1.05rem;font-weight:700;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap; }
    .topbar-right { display:flex;align-items:center;gap:0.5rem;flex-shrink:0; }
    .btn-nav { display:inline-flex;align-items:center;gap:0.35rem;padding:0.45rem 0.9rem;border-radius:var(--radius-sm);border:none;font-size:0.82rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity 0.2s;white-space:nowrap; }
    .btn-saving { background:#1a7a4a;color:#a8f0cc; }
    .btn-logout { background:rgba(255,95,109,0.15);color:var(--red);border:1px solid rgba(255,95,109,0.25); }
    .btn-nav:hover { opacity:0.85; }
    .filter-bar { padding:0.75rem 1rem;display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap; }
    .filter-bar label { font-size:0.82rem;color:var(--muted);white-space:nowrap; }
    .filter-bar input[type="month"] { flex:1;min-width:130px;padding:0.5rem 0.75rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.9rem; }
    .filter-bar input[type="month"]:focus { outline:none;border-color:var(--accent); }
    .btn-filter { padding:0.5rem 1.1rem;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#0a2e22;font-weight:700;font-size:0.85rem;cursor:pointer;white-space:nowrap;transition:opacity 0.2s; }
    .btn-filter:hover { opacity:0.85; }
    .content { max-width:900px;margin:0 auto;padding:0 1rem; }
    .summary-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;margin-bottom:1.25rem; }
    @media(max-width:420px){.summary-grid{grid-template-columns:1fr;gap:0.6rem}}
    .summary-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 0.9rem;text-align:center; }
    .summary-card .label { font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:0.4rem; }
    .summary-card .value { font-size:clamp(1rem,4vw,1.5rem);font-weight:700;line-height:1.2;word-break:break-all; }
    .value.green{color:var(--green)}.value.red{color:var(--red)}.value.blue{color:var(--blue)}
    .tab-bar { display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0.3rem;margin-bottom:1.25rem;gap:0.3rem; }
    .tab-btn { flex:1;padding:0.65rem;border:none;border-radius:10px;background:transparent;color:var(--muted);font-size:0.88rem;font-weight:600;cursor:pointer;transition:background 0.2s,color 0.2s; }
    .tab-btn.active-income{background:rgba(0,212,160,0.15);color:var(--green)}.tab-btn.active-expense{background:rgba(255,95,109,0.15);color:var(--red)}
    .form-panel { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;margin-bottom:1.25rem;display:none; }
    .form-panel.active{display:block}
    .form-panel h2{font-size:1rem;font-weight:700;margin-bottom:1rem}
    .income-panel h2{color:var(--green)}.expense-panel h2{color:var(--red)}
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem; }
    @media(max-width:480px){.form-row{grid-template-columns:1fr}}
    .form-group{display:flex;flex-direction:column;gap:0.3rem}
    .form-group label{font-size:0.78rem;color:var(--muted);font-weight:500}
    .form-group input,.form-group select { padding:0.65rem 0.8rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:0.95rem;width:100%;appearance:auto; }
    .form-group select option{background:#1c1f27}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
    .form-group.full{grid-column:1/-1}
    .btn-submit { width:100%;margin-top:0.25rem;padding:0.8rem;border:none;border-radius:var(--radius-sm);font-size:0.95rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s; }
    .btn-submit:hover{opacity:0.88;transform:translateY(-1px)}.btn-submit:active{transform:scale(0.98)}
    .btn-income{background:var(--green);color:#0a2e22}.btn-expense{background:var(--red);color:#fff}
    .tx-section { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem; }
    .tx-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:0.5rem;flex-wrap:wrap; }
    .tx-header h2{font-size:0.95rem;font-weight:700}
    .tx-month-badge { font-size:0.78rem;color:var(--muted);background:var(--surface2);padding:0.25rem 0.6rem;border-radius:20px; }
    .tx-list{list-style:none}
    .tx-item { display:flex;align-items:center;gap:0.75rem;padding:0.85rem 0;border-bottom:1px solid var(--border); }
    .tx-item:last-child{border-bottom:none}
    .tx-icon { width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.9rem;flex-shrink:0; }
    .tx-icon.income{background:rgba(0,212,160,0.12);color:var(--green)}.tx-icon.expense{background:rgba(255,95,109,0.12);color:var(--red)}
    .tx-info{flex:1;min-width:0}
    .tx-name { font-size:0.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .tx-meta { font-size:0.72rem;color:var(--muted);margin-top:0.15rem;display:flex;gap:0.4rem;flex-wrap:wrap; }
    .tx-cat { background:var(--surface2);padding:0.1rem 0.45rem;border-radius:10px;font-size:0.68rem; }
    .tx-amount{font-size:0.92rem;font-weight:700;white-space:nowrap;flex-shrink:0}
    .tx-amount.income{color:var(--green)}.tx-amount.expense{color:var(--red)}
    .tx-delete { background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s,color 0.2s; }
    .tx-delete:hover{background:rgba(255,95,109,0.15);color:var(--red)}
    .tx-empty { text-align:center;color:var(--muted);padding:2rem 0;font-size:0.9rem;font-style:italic; }
    .toast { position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);color:var(--text);padding:0.7rem 1.4rem;border-radius:50px;font-size:0.88rem;font-weight:600;border:1px solid var(--border);z-index:999;opacity:0;transition:transform 0.3s,opacity 0.3s;white-space:nowrap; }
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}.toast.success{border-color:var(--green);color:var(--green)}.toast.error{border-color:var(--red);color:var(--red)}
    .spinner { display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle; }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-row{text-align:center;padding:2rem 0;color:var(--muted)}
    footer { text-align:center;padding:1.5rem 1rem 0.5rem;font-size:0.78rem;color:var(--muted);border-top:1px solid var(--border);margin-top:1.5rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>💰 Income & Expense</h1>
    <div class="topbar-right">
      <a href="saving.html" class="btn-nav btn-saving">🏦 Saving</a>
      <button class="btn-nav btn-logout" onclick="logout()">❌</button>
    </div>
  </header>

  <div class="filter-bar">
    <label for="monthPicker">Month:</label>
    <input type="month" id="monthPicker" />
    <button class="btn-filter" onclick="loadData()">Filter</button>
  </div>

  <main class="content">
    <div class="summary-grid">
      <div class="summary-card"><div class="label">Income</div><div class="value green" id="totalIncome">—</div></div>
      <div class="summary-card"><div class="label">Expenses</div><div class="value red" id="totalExpenses">—</div></div>
      <div class="summary-card"><div class="label">Balance</div><div class="value blue" id="netBalance">—</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active-income" id="tabIncome"  onclick="switchTab('income')">＋ Income</button>
      <button class="tab-btn"               id="tabExpense" onclick="switchTab('expense')">－ Expense</button>
    </div>

    <div class="form-panel income-panel active" id="panelIncome">
      <h2>Add Income</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Income Type</label>
          <select id="incCategory">
            <option value="salary">Salary</option>
            <option value="freelance">Freelance</option>
            <option value="investment">Investment</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (Rs.)</label>
          <input type="number" id="incAmount" step="0.01" min="0.01" placeholder="0.00" />
        </div>
        <div class="form-group full">
          <label>Description</label>
          <input type="text" id="incDesc" placeholder="e.g. Monthly salary" />
        </div>
      </div>
      <button class="btn-submit btn-income" onclick="submitForm('income')">Add Income</button>
    </div>

    <div class="form-panel expense-panel" id="panelExpense">
      <h2>Add Expense</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Expense Type</label>
          <select id="expCategory">
            <option value="communication">Communication</option>
            <option value="groceries">Groceries</option>
            <option value="transport">Transport</option>
            <option value="Saving">Saving</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (Rs.)</label>
          <input type="number" id="expAmount" step="0.01" min="0.01" placeholder="0.00" />
        </div>
        <div class="form-group full">
          <label>Description</label>
          <input type="text" id="expDesc" placeholder="e.g. Bus fare" />
        </div>
      </div>
      <button class="btn-submit btn-expense" onclick="submitForm('expense')">Add Expense</button>
    </div>

    <div class="tx-section">
      <div class="tx-header">
        <h2>Transactions</h2>
        <span class="tx-month-badge" id="txMonthLabel">—</span>
      </div>
      <ul class="tx-list" id="txList">
        <li class="loading-row"><span class="spinner"></span> Loading…</li>
      </ul>
    </div>
  </main>

  <footer>© All rights reserved. A product by <strong>Avishka Batapola</strong>.</footer>
  <div class="toast" id="toast"></div>

  <!-- Load the shared offline DB library -->
  <script src="db.js"></script>
  <script>
    // Auth guard
    if (sessionStorage.getItem('ft_auth') !== 'true') {
      location.replace('login.html');
    }

    // Helpers
    function fmt(n) {
      return 'Rs.' + parseFloat(n || 0).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
    }
    function currentMonth() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + (type||'success') + ' show';
      setTimeout(function(){ t.className='toast'; }, 3000);
    }
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function logout() {
      if (!confirm('Log out?')) return;
      sessionStorage.clear();
      location.replace('login.html');
    }

    // Tab switcher
    function switchTab(tab) {
      var btnI=document.getElementById('tabIncome'), btnE=document.getElementById('tabExpense');
      var panI=document.getElementById('panelIncome'), panE=document.getElementById('panelExpense');
      if (tab==='income') {
        btnI.className='tab-btn active-income'; btnE.className='tab-btn';
        panI.classList.add('active'); panE.classList.remove('active');
      } else {
        btnE.className='tab-btn active-expense'; btnI.className='tab-btn';
        panE.classList.add('active'); panI.classList.remove('active');
      }
    }

    // Load transactions from IndexedDB
    function loadData() {
      var month = document.getElementById('monthPicker').value || currentMonth();
      document.getElementById('txList').innerHTML = '<li class="loading-row"><span class="spinner"></span> Loading…</li>';

      FinanceDB.getTransactions(month).then(function(data) {
        document.getElementById('totalIncome').textContent   = fmt(data.total_income);
        document.getElementById('totalExpenses').textContent = fmt(data.total_expenses);
        document.getElementById('netBalance').textContent    = fmt(data.net_balance);
        document.getElementById('txMonthLabel').textContent  = data.month || '—';

        var list = document.getElementById('txList');
        if (!data.transactions || data.transactions.length === 0) {
          list.innerHTML = '<li class="tx-empty">No transactions this month.</li>';
          return;
        }
        list.innerHTML = data.transactions.map(function(tx) {
          var isIncome = tx.type === 'income';
          return '<li class="tx-item">' +
            '<div class="tx-icon ' + tx.type + '">' + (isIncome ? '↑' : '↓') + '</div>' +
            '<div class="tx-info">' +
              '<div class="tx-name">' + escHtml(tx.description) + '</div>' +
              '<div class="tx-meta"><span>' + escHtml(tx.date) + '</span><span class="tx-cat">' + escHtml(tx.category) + '</span></div>' +
            '</div>' +
            '<div class="tx-amount ' + tx.type + '">' + (isIncome ? '+' : '−') + fmt(tx.amount) + '</div>' +
            '<button class="tx-delete" onclick="deleteTransaction(' + Number(tx.id) + ')" title="Delete">✕</button>' +
          '</li>';
        }).join('');
      }).catch(function(err) {
        document.getElementById('txList').innerHTML = '<li class="tx-empty">Error loading data.</li>';
        console.error(err);
      });
    }

    // Submit form → save to IndexedDB
    function submitForm(type) {
      var category, amount, desc;
      if (type === 'income') {
        category = document.getElementById('incCategory').value;
        amount   = document.getElementById('incAmount').value;
        desc     = document.getElementById('incDesc').value.trim();
      } else {
        category = document.getElementById('expCategory').value;
        amount   = document.getElementById('expAmount').value;
        desc     = document.getElementById('expDesc').value.trim();
      }
      if (!desc)                         { showToast('Please enter a description.','error'); return; }
      if (!amount || parseFloat(amount)<=0){ showToast('Enter a valid amount.','error'); return; }

      var month = document.getElementById('monthPicker').value || currentMonth();
      var btn   = document.querySelector(type==='income' ? '.btn-income' : '.btn-expense');
      var orig  = btn.textContent;
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';

      FinanceDB.addTransaction(type, category, amount, desc, month).then(function(data) {
        if (data.success) {
          showToast('Transaction added!','success');
          if (type==='income') { document.getElementById('incAmount').value=''; document.getElementById('incDesc').value=''; }
          else                 { document.getElementById('expAmount').value=''; document.getElementById('expDesc').value=''; }
          loadData();
        } else {
          showToast(data.message||'Error.','error');
        }
      }).catch(function(err){
        showToast('Error: ' + err.message, 'error');
      }).finally(function(){
        btn.disabled=false; btn.textContent=orig;
      });
    }

    // Delete from IndexedDB
    function deleteTransaction(id) {
      if (!confirm('Delete this transaction?')) return;
      FinanceDB.deleteTransaction(id).then(function(data) {
        if (data.success) { showToast('Deleted.','success'); loadData(); }
        else showToast('Delete failed.','error');
      }).catch(function(err){ showToast('Error: '+err.message,'error'); });
    }

    // Init: seed existing data, then load
    FinanceDB.init().then(function(){
      return FinanceDB.seedIfEmpty();
    }).then(function(){
      document.getElementById('monthPicker').value = currentMonth();
      loadData();
    }).catch(function(err){ console.error('DB init error:', err); });
  </script>
</body>
</html>
