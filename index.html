<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Finance Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0d0f14; --surface:#141720; --surface2:#1b1f2a; --surface3:#222636;
      --border:rgba(255,255,255,0.07); --text:#eef0f6; --muted:#6b7280;
      --green:#00d4a0; --green-dim:rgba(0,212,160,0.12);
      --red:#ff5f6d; --red-dim:rgba(255,95,109,0.10);
      --blue:#4fc3f7; --blue-dim:rgba(79,195,247,0.10);
      --purple:#818cf8;
      --radius:16px; --radius-sm:10px;
      --shadow:0 4px 24px rgba(0,0,0,0.35);
    }
    [data-theme="light"] {
      --bg:#f0f2f8; --surface:#ffffff; --surface2:#f4f5fb; --surface3:#eaecf4;
      --border:rgba(0,0,0,0.07); --text:#111318; --muted:#7a7f93;
      --shadow:0 4px 24px rgba(0,0,0,0.08);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:3rem; transition:background .3s,color .3s; }

    /* ── PAGE LOAD ANIMATION ─── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation:fadeUp .5s ease both; }
    .fade-up-1 { animation:fadeUp .5s ease .05s both; }
    .fade-up-2 { animation:fadeUp .5s ease .10s both; }
    .fade-up-3 { animation:fadeUp .5s ease .15s both; }
    .fade-up-4 { animation:fadeUp .5s ease .20s both; }
    .fade-up-5 { animation:fadeUp .5s ease .25s both; }

    /* ── TOPBAR ─── */
    .topbar {
      position:sticky; top:0; z-index:100;
      background:rgba(20,23,32,0.85);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      padding:.75rem 1rem; display:flex; align-items:center;
      justify-content:space-between; gap:.75rem;
    }
    [data-theme="light"] .topbar { background:rgba(255,255,255,0.85); }
    .topbar-brand { display:flex; align-items:center; gap:.6rem; }
    .topbar-brand-icon {
      width:34px; height:34px; border-radius:10px;
      background:linear-gradient(135deg,#00d4a0,#4fc3f7);
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
      box-shadow:0 4px 12px rgba(0,212,160,.3);
    }
    .topbar-brand h1 { font-size:.95rem; font-weight:700; color:var(--text); }
    .topbar-right { display:flex; align-items:center; gap:.5rem; flex-shrink:0; }
    .btn-nav {
      display:inline-flex; align-items:center; gap:.3rem;
      padding:.42rem .8rem; border-radius:8px; border:1px solid var(--border);
      background:var(--surface2); color:var(--muted);
      font-size:.78rem; font-weight:600; cursor:pointer;
      text-decoration:none; transition:all .2s; white-space:nowrap;
    }
    .btn-nav:hover { color:var(--text); border-color:rgba(255,255,255,.15); }
    .btn-saving { background:var(--green-dim); color:var(--green); border-color:rgba(0,212,160,.25); }
    .btn-saving:hover { background:rgba(0,212,160,.2); color:var(--green); }
    .btn-logout { background:var(--red-dim); color:var(--red); border-color:rgba(255,95,109,.25); }
    .btn-logout:hover { background:rgba(255,95,109,.18); color:var(--red); }
    .theme-btn {
      width:34px; height:34px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface2); color:var(--muted);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; font-size:1rem; transition:all .2s; flex-shrink:0;
    }
    .theme-btn:hover { color:var(--text); }

    /* ── CONTENT ─── */
    .content { max-width:520px; margin:0 auto; padding:1.2rem 1rem; }

    /* ── MONTH NAV ─── */
    .month-nav {
      display:flex; align-items:center; justify-content:space-between;
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:.7rem 1rem;
      margin-bottom:1rem; box-shadow:var(--shadow);
    }
    .month-nav-btn {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border);
      background:var(--surface2); color:var(--muted); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:1rem; transition:all .2s;
    }
    .month-nav-btn:hover { color:var(--text); border-color:rgba(255,255,255,.15); }
    .month-label { font-size:.95rem; font-weight:700; color:var(--text); }
    .month-year  { font-size:.72rem; color:var(--muted); text-align:center; margin-top:.1rem; }

    /* ── SUMMARY CARDS ─── */
    .summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; margin-bottom:1rem; }
    .summary-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1.1rem 1rem;
      position:relative; overflow:hidden; text-align:center;
      box-shadow:var(--shadow); transition:transform .2s;
    }
    .summary-card.card-balance { grid-column:1 / -1; padding:1.3rem 1rem; }
    .summary-card:hover { transform:translateY(-2px); }
    .summary-card::before {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,var(--accent-color) 0%,transparent 60%);
      opacity:.05;
    }
    .card-income  { --accent-color:#00d4a0; }
    .card-expense { --accent-color:#ff5f6d; }
    .card-balance { --accent-color:#4fc3f7; }
    .card-glow-line { position:absolute; top:0; left:0; right:0; height:2px; }
    .card-income  .card-glow-line { background:linear-gradient(90deg,transparent,#00d4a0,transparent); }
    .card-expense .card-glow-line { background:linear-gradient(90deg,transparent,#ff5f6d,transparent); }
    .card-balance .card-glow-line { background:linear-gradient(90deg,transparent,#4fc3f7,transparent); }
    .card-icon  { font-size:1.2rem; margin-bottom:.35rem; }
    .card-label { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.35rem; }
    .card-value { font-size:clamp(1rem,4.5vw,1.35rem); font-weight:800; line-height:1.1; }
    .card-balance .card-value { font-size:clamp(1.3rem,6vw,1.9rem); }
    .card-balance .card-label { font-size:.72rem; }
    .val-green { color:var(--green); }
    .val-red   { color:var(--red); }
    .val-blue  { color:var(--blue); }

    /* ── ADD FORM ─── */
    .form-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1.2rem 1rem;
      margin-bottom:1rem; box-shadow:var(--shadow);
    }
    .section-title {
      font-size:.8rem; font-weight:700; color:var(--muted);
      text-transform:uppercase; letter-spacing:.08em;
      margin-bottom:1rem; display:flex; align-items:center; gap:.5rem;
    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

    .type-tabs { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:1rem; }
    .type-tab {
      padding:.65rem; border-radius:var(--radius-sm);
      border:1px solid var(--border); background:var(--surface2);
      color:var(--muted); font-size:.82rem; font-weight:600;
      cursor:pointer; text-align:center; transition:all .2s;
    }
    .type-tab.active-income  { background:var(--green-dim); color:var(--green); border-color:rgba(0,212,160,.3); }
    .type-tab.active-expense { background:var(--red-dim);   color:var(--red);   border-color:rgba(255,95,109,.3); }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; margin-bottom:.65rem; }
    @media(max-width:400px) { .form-row { grid-template-columns:1fr; } }
    .form-group { display:flex; flex-direction:column; gap:.3rem; }
    .form-group label { font-size:.72rem; font-weight:600; color:var(--muted); }
    .form-group select,
    .form-group input {
      padding:.7rem .85rem; border-radius:var(--radius-sm);
      border:1px solid var(--border); background:var(--surface2);
      color:var(--text); font-size:.9rem; font-family:inherit;
      transition:border-color .2s, box-shadow .2s; width:100%;
    }
    .form-group select:focus,
    .form-group input:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(0,212,160,.1); }
    .form-group input::placeholder { color:var(--muted); opacity:.6; }

    .btn-add {
      width:100%; padding:.82rem; border:none;
      border-radius:var(--radius-sm);
      background:linear-gradient(90deg,#00d4a0,#00b882);
      color:#062e1f; font-size:.9rem; font-weight:700;
      cursor:pointer; transition:all .2s;
      box-shadow:0 4px 16px rgba(0,212,160,.25);
    }
    .btn-add:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 6px 22px rgba(0,212,160,.38); }
    .btn-add:active { transform:scale(.98); }
    .btn-add:disabled { opacity:.45; cursor:not-allowed; transform:none; }
    .btn-add.expense-mode { background:linear-gradient(90deg,#ff5f6d,#e0404d); color:#fff; box-shadow:0 4px 16px rgba(255,95,109,.25); }

    /* ── TRANSACTION LIST ─── */
    .list-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1.2rem 1rem;
      box-shadow:var(--shadow);
    }
    .filter-tabs { display:flex; gap:.4rem; margin-bottom:1rem; flex-wrap:wrap; }
    .ftab {
      padding:.35rem .8rem; border-radius:99px;
      border:1px solid var(--border); background:none;
      color:var(--muted); font-size:.75rem; font-weight:600;
      cursor:pointer; transition:all .2s; font-family:inherit;
    }
    .ftab.active { background:var(--surface3); color:var(--text); border-color:rgba(255,255,255,.15); }
    .ftab.income.active  { background:var(--green-dim); color:var(--green); border-color:rgba(0,212,160,.3); }
    .ftab.expense.active { background:var(--red-dim);   color:var(--red);   border-color:rgba(255,95,109,.3); }

    .tx-list { list-style:none; }
    .tx-item {
      display:flex; align-items:center; gap:.75rem;
      padding:.8rem 0; border-bottom:1px solid var(--border);
      animation:fadeUp .3s ease both;
    }
    .tx-item:last-child { border-bottom:none; padding-bottom:0; }
    .tx-icon {
      width:38px; height:38px; border-radius:11px;
      display:flex; align-items:center; justify-content:center;
      font-size:.85rem; font-weight:700; flex-shrink:0;
    }
    .tx-icon.income  { background:var(--green-dim); color:var(--green); }
    .tx-icon.expense { background:var(--red-dim);   color:var(--red); }
    .tx-info { flex:1; min-width:0; }
    .tx-name { font-size:.88rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tx-meta { font-size:.7rem; color:var(--muted); margin-top:.15rem; display:flex; align-items:center; gap:.4rem; }
    .tx-cat-badge {
      display:inline-block; padding:.1rem .45rem; border-radius:99px;
      font-size:.62rem; font-weight:600; background:var(--surface3);
      color:var(--muted); text-transform:capitalize;
    }
    .tx-amount { font-size:.9rem; font-weight:700; white-space:nowrap; flex-shrink:0; }
    .tx-amount.income  { color:var(--green); }
    .tx-amount.expense { color:var(--red); }
    .tx-delete {
      background:none; border:none; color:var(--muted); cursor:pointer;
      width:28px; height:28px; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      font-size:.8rem; flex-shrink:0; transition:all .2s;
    }
    .tx-delete:hover { background:var(--red-dim); color:var(--red); }

    .tx-empty { text-align:center; color:var(--muted); padding:2.5rem 0; }
    .tx-empty-icon { font-size:2.5rem; margin-bottom:.6rem; opacity:.4; }
    .tx-empty-text { font-size:.85rem; }

    /* ── SKELETON LOADING ─── */
    .skeleton-wrap { padding:.5rem 0; }
    .skeleton-item { display:flex; align-items:center; gap:.75rem; padding:.8rem 0; border-bottom:1px solid var(--border); }
    .skeleton-item:last-child { border-bottom:none; }
    .sk { background:var(--surface2); border-radius:6px; animation:skpulse 1.4s ease-in-out infinite; }
    .sk-circle { width:38px; height:38px; border-radius:11px; flex-shrink:0; }
    .sk-lines { flex:1; display:flex; flex-direction:column; gap:.4rem; }
    .sk-line  { height:10px; }
    .sk-line.w80 { width:80%; }
    .sk-line.w50 { width:50%; }
    .sk-amount { width:60px; height:14px; flex-shrink:0; }
    @keyframes skpulse { 0%,100%{opacity:.35} 50%{opacity:.7} }

    /* ── SPINNER ─── */
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── TOAST ─── */
    .toast {
      position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%) translateY(80px);
      background:var(--surface); color:var(--text);
      padding:.65rem 1.4rem; border-radius:99px; font-size:.83rem; font-weight:600;
      border:1px solid var(--border); box-shadow:0 8px 30px rgba(0,0,0,.4);
      z-index:999; opacity:0; transition:transform .3s,opacity .3s; white-space:nowrap;
    }
    .toast.show    { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast.success { border-color:rgba(0,212,160,.4); color:var(--green); }
    .toast.error   { border-color:rgba(255,95,109,.4); color:var(--red); }

    /* ── CONFIRM DIALOG ─── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6);
      z-index:800; display:flex; align-items:center; justify-content:center;
      padding:1.5rem; opacity:0; pointer-events:none; transition:opacity .2s;
      backdrop-filter:blur(4px);
    }
    .overlay.show { opacity:1; pointer-events:all; }
    .dialog {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:1.5rem; max-width:300px; width:100%;
      transform:scale(.9); transition:transform .25s; box-shadow:0 24px 64px rgba(0,0,0,.5);
    }
    .overlay.show .dialog { transform:scale(1); }
    .dialog-icon { font-size:2rem; text-align:center; margin-bottom:.6rem; }
    .dialog-title { font-size:1rem; font-weight:700; text-align:center; margin-bottom:.4rem; }
    .dialog-msg { font-size:.82rem; color:var(--muted); text-align:center; margin-bottom:1.2rem; line-height:1.5; }
    .dialog-btns { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
    .dialog-btn {
      padding:.7rem; border-radius:var(--radius-sm); border:1px solid var(--border);
      background:var(--surface2); color:var(--text); font-size:.85rem; font-weight:600;
      cursor:pointer; transition:all .2s; font-family:inherit;
    }
    .dialog-btn.confirm { background:var(--red-dim); color:var(--red); border-color:rgba(255,95,109,.3); }
    .dialog-btn:hover { opacity:.8; }

    footer { text-align:center; padding:1.5rem 1rem .5rem; font-size:.72rem; color:var(--muted); margin-top:1rem; border-top:1px solid var(--border); }
  </style>
</head>
<body>
  <header class="topbar fade-up">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">💰</div>
      <h1>Finance Tracker</h1>
    </div>
    <div class="topbar-right">
      <a href="saving.html" class="btn-nav btn-saving">🏦 Saving</a>
      <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="btn-nav btn-logout" onclick="confirmLogout()">⏻</button>
    </div>
  </header>

  <main class="content">
    <!-- Month nav -->
    <div class="month-nav fade-up-1">
      <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div style="text-align:center">
        <div class="month-label" id="monthLabel">—</div>
        <div class="month-year"  id="yearLabel">—</div>
      </div>
      <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
    </div>

    <!-- Summary -->
    <div class="summary-grid fade-up-2">
      <div class="summary-card card-income">
        <div class="card-glow-line"></div>
        <div class="card-icon">📈</div>
        <div class="card-label">Income</div>
        <div class="card-value val-green" id="totalIncome">—</div>
      </div>
      <div class="summary-card card-expense">
        <div class="card-glow-line"></div>
        <div class="card-icon">📉</div>
        <div class="card-label">Expenses</div>
        <div class="card-value val-red" id="totalExpenses">—</div>
      </div>
      <div class="summary-card card-balance">
        <div class="card-glow-line"></div>
        <div class="card-icon">💼</div>
        <div class="card-label">Balance</div>
        <div class="card-value val-blue" id="netBalance">—</div>
      </div>
    </div>

    <!-- Add form -->
    <div class="form-card fade-up-3">
      <div class="section-title">Add Transaction</div>
      <div class="type-tabs">
        <button class="type-tab active-income" id="tabIncome"  onclick="setType('income')">📈 Income</button>
        <button class="type-tab"              id="tabExpense" onclick="setType('expense')">📉 Expense</button>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="category">
            <option value="salary">💼 Salary</option>
            <option value="investment">📊 Investment</option>
            <option value="other">📦 Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (Rs.)</label>
          <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:.65rem">
        <label>Description</label>
        <input type="text" id="description" placeholder="e.g. March salary" />
      </div>
      <button class="btn-add" id="addBtn" onclick="submitAdd()">+ Add Income</button>
    </div>

    <!-- Transaction list -->
    <div class="list-card fade-up-4">
      <div class="section-title">Transactions</div>
      <div class="filter-tabs">
        <button class="ftab active"          data-filter="all"     onclick="setFilter(this,'all')">All</button>
        <button class="ftab income"          data-filter="income"  onclick="setFilter(this,'income')">Income</button>
        <button class="ftab expense"         data-filter="expense" onclick="setFilter(this,'expense')">Expenses</button>
      </div>
      <ul class="tx-list" id="txList">
        <li class="skeleton-wrap" id="skeletonLoad">
          <div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div>
          <div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div>
          <div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div>
        </li>
      </ul>
    </div>
  </main>

  <footer>© All rights reserved. A product by <strong>Avishka Batapola</strong>.</footer>
  <div class="toast" id="toast"></div>

  <!-- Confirm dialog -->
  <div class="overlay" id="overlay">
    <div class="dialog">
      <div class="dialog-icon" id="dialogIcon">🗑️</div>
      <div class="dialog-title" id="dialogTitle">Delete Transaction?</div>
      <div class="dialog-msg"   id="dialogMsg">This action cannot be undone.</div>
      <div class="dialog-btns">
        <button class="dialog-btn"         onclick="closeDialog()">Cancel</button>
        <button class="dialog-btn confirm" id="dialogConfirm">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="db.js"></script>
  <script>
    if (sessionStorage.getItem('ft_auth') !== 'true') { location.replace('login.html'); }

    // ── State ─────────────────────────────────────────────
    var currentType   = 'income';
    var activeFilter  = 'all';
    var allTx         = [];
    var currentDate   = new Date();
    var currentYear   = currentDate.getFullYear();
    var currentMonth  = currentDate.getMonth(); // 0-indexed

    var MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];
    var INCOME_CATS  = ['salary','investment','other'];
    var EXPENSE_CATS = ['groceries','transport','communication','entertainment','health','Saving','other'];

    function currentYM() {
      return currentYear + '-' + String(currentMonth + 1).padStart(2,'0');
    }

    // ── Theme ─────────────────────────────────────────────
    var theme = 'dark';
    try { theme = localStorage.getItem('ft-theme') || 'dark'; } catch(e){}
    function applyTheme(t) {
      theme = t;
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
      try { localStorage.setItem('ft-theme', t); } catch(e){}
    }
    applyTheme(theme);
    function toggleTheme() { applyTheme(theme === 'dark' ? 'light' : 'dark'); }

    // ── Month nav ─────────────────────────────────────────
    function updateMonthLabel() {
      document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth];
      document.getElementById('yearLabel').textContent  = currentYear;
    }
    function changeMonth(dir) {
      currentMonth += dir;
      if (currentMonth > 11) { currentMonth = 0;  currentYear++; }
      if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
      updateMonthLabel();
      loadData();
    }
    updateMonthLabel();

    // ── Helpers ───────────────────────────────────────────
    function fmt(n) {
      return 'Rs.' + parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    }
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function showToast(msg, type) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast ' + (type||'success') + ' show';
      setTimeout(function(){ t.className = 'toast'; }, 3000);
    }

    // ── Dialog ────────────────────────────────────────────
    var pendingDeleteId = null;
    function confirmDelete(id, desc) {
      pendingDeleteId = id;
      document.getElementById('dialogMsg').textContent = '"' + desc + '"';
      document.getElementById('overlay').classList.add('show');
      document.getElementById('dialogConfirm').onclick = doDelete;
    }
    function closeDialog() {
      pendingDeleteId = null;
      document.getElementById('overlay').classList.remove('show');
    }
    document.getElementById('overlay').addEventListener('click', function(e){
      if (e.target === this) closeDialog();
    });
    function doDelete() {
      if (!pendingDeleteId) return;
      var id = pendingDeleteId;
      closeDialog();
      FinanceDB.deleteTransaction(id).then(function(data) {
        if (data.success) { showToast('Transaction deleted.','success'); loadData(); }
        else showToast('Delete failed.','error');
      }).catch(function(err){ showToast('Error: '+err.message,'error'); });
    }

    // ── Type tabs ─────────────────────────────────────────
    function setType(type) {
      currentType = type;
      document.getElementById('tabIncome').className  = 'type-tab' + (type==='income'  ? ' active-income'  : '');
      document.getElementById('tabExpense').className = 'type-tab' + (type==='expense' ? ' active-expense' : '');
      document.getElementById('addBtn').textContent   = '+ Add ' + (type==='income' ? 'Income' : 'Expense');
      document.getElementById('addBtn').className     = 'btn-add' + (type==='expense' ? ' expense-mode' : '');
      // Update category options
      var sel = document.getElementById('category');
      var cats = type === 'income' ? INCOME_CATS : EXPENSE_CATS;
      var icons = {salary:'💼',investment:'📊',other:'📦',groceries:'🛒',transport:'🚌',communication:'📡',entertainment:'🎮',health:'💊',Saving:'🏦'};
      sel.innerHTML = cats.map(function(c){ return '<option value="'+c+'">'+(icons[c]||'•')+' '+c.charAt(0).toUpperCase()+c.slice(1)+'</option>'; }).join('');
    }
    setType('income');

    // ── Filter ────────────────────────────────────────────
    function setFilter(btn, filter) {
      activeFilter = filter;
      document.querySelectorAll('.ftab').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      renderList();
    }

    // ── Load data ─────────────────────────────────────────
    function loadData() {
      document.getElementById('txList').innerHTML =
        '<li class="skeleton-wrap"><div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div><div class="skeleton-item"><div class="sk sk-circle"></div><div class="sk-lines"><div class="sk sk-line w80"></div><div class="sk sk-line w50"></div></div><div class="sk sk-amount"></div></div></li>';
      document.getElementById('totalIncome').textContent   = '—';
      document.getElementById('totalExpenses').textContent = '—';
      document.getElementById('netBalance').textContent    = '—';

      FinanceDB.getTransactions(currentYM()).then(function(data) {
        document.getElementById('totalIncome').textContent   = fmt(data.total_income);
        document.getElementById('totalExpenses').textContent = fmt(data.total_expenses);
        document.getElementById('netBalance').textContent    = fmt(data.net_balance);
        allTx = data.transactions || [];
        renderList();
      }).catch(function(err){
        document.getElementById('txList').innerHTML = '<li class="tx-empty"><div class="tx-empty-icon">⚠️</div><div class="tx-empty-text">Error loading data.</div></li>';
        console.error(err);
      });
    }

    // ── Render list ───────────────────────────────────────
    function renderList() {
      var list = document.getElementById('txList');
      var filtered = activeFilter === 'all' ? allTx : allTx.filter(function(t){ return t.type === activeFilter; });
      if (!filtered.length) {
        list.innerHTML = '<li class="tx-empty"><div class="tx-empty-icon">'+(activeFilter==='income'?'📈':activeFilter==='expense'?'📉':'📋')+'</div><div class="tx-empty-text">No transactions found.</div></li>';
        return;
      }
      list.innerHTML = filtered.map(function(tx, i) {
        var isIncome = tx.type === 'income';
        var delay    = Math.min(i * 0.04, 0.4);
        return '<li class="tx-item" style="animation-delay:'+delay+'s">' +
          '<div class="tx-icon '+esc(tx.type)+'">'+(isIncome?'↑':'↓')+'</div>' +
          '<div class="tx-info">' +
            '<div class="tx-name">'+esc(tx.description)+'</div>' +
            '<div class="tx-meta">' +
              '<span class="tx-cat-badge">'+esc(tx.category)+'</span>' +
            '</div>' +
            '<div class="tx-meta">' +
            '<span>'+esc(tx.date||'')+'</span>' +
            '</div>' +
          '</div>' +
          '<div class="tx-amount '+esc(tx.type)+'">'+(isIncome?'+':'−')+fmt(tx.amount)+'</div>' +
          '<button class="tx-delete" onclick="confirmDelete(\''+esc(tx.id)+'\',\''+esc(tx.description)+'\')" title="Delete">✕</button>' +
        '</li>';
      }).join('');
    }

    // ── Add transaction ───────────────────────────────────
    function submitAdd() {
      var cat  = document.getElementById('category').value;
      var amt  = document.getElementById('amount').value;
      var desc = document.getElementById('description').value.trim();
      if (!desc)               { showToast('Please enter a description.','error'); return; }
      if (!amt||parseFloat(amt)<=0) { showToast('Enter a valid amount.','error'); return; }
      var btn  = document.getElementById('addBtn');
      var orig = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving…';
      FinanceDB.addTransaction(currentType, cat, amt, desc, currentYM()).then(function(data) {
        if (data.success) {
          showToast('Transaction added!','success');
          document.getElementById('amount').value      = '';
          document.getElementById('description').value = '';
          loadData();
        } else {
          showToast(data.message||'Error.','error');
        }
      }).catch(function(err){
        showToast('Error: '+err.message,'error');
      }).finally(function(){
        btn.disabled = false; btn.textContent = orig;
      });
    }

    // ── Logout ────────────────────────────────────────────
    function confirmLogout() {
      document.getElementById('dialogIcon').textContent  = '👋';
      document.getElementById('dialogTitle').textContent = 'Log out?';
      document.getElementById('dialogMsg').textContent   = 'You will be returned to the login screen.';
      document.getElementById('dialogConfirm').textContent = 'Log out';
      document.getElementById('dialogConfirm').onclick = function() {
        sessionStorage.clear(); location.replace('login.html');
      };
      document.getElementById('overlay').classList.add('show');
    }

    // ── Init ──────────────────────────────────────────────
    FinanceDB.init().then(function(){ return FinanceDB.seedIfEmpty(); }).then(function(){ loadData(); }).catch(function(err){ console.error('DB init error:', err); });
  </script>
</body>
</html>
