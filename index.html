<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
  <title>Income & Expense Tracker</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#111318; --surface:#1c1f27; --surface2:#242831;
      --border:rgba(255,255,255,0.08); --text:#e8eaf0; --muted:#8a8f9e;
      --green:#00d4a0; --red:#ff5f6d; --blue:#4fc3f7; --accent:#00d4a0;
      --radius:14px; --radius-sm:8px;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:2rem;}
    .topbar{position:sticky;top:0;z-index:100;background:rgba(17,19,24,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:.85rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
    .topbar h1{font-size:1.05rem;font-weight:700;background:linear-gradient(90deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
    .topbar-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
    .btn-nav{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;border-radius:var(--radius-sm);border:none;font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s;white-space:nowrap;}
    .btn-saving{background:#1a7a4a;color:#a8f0cc;}
    .btn-logout{background:rgba(255,95,109,.15);color:var(--red);border:1px solid rgba(255,95,109,.25);}
    .btn-export{background:rgba(79,195,247,.12);color:var(--blue);border:1px solid rgba(79,195,247,.25);}
    .btn-nav:hover{opacity:.85;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 1.25rem;width:100%;max-width:340px;transform:translateY(16px);transition:transform .25s;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal h3{font-size:1rem;font-weight:700;margin-bottom:.3rem;color:var(--blue);}
    .modal p{font-size:.8rem;color:var(--muted);margin-bottom:1.1rem;line-height:1.5;}
    .modal-btns{display:flex;flex-direction:column;gap:.6rem;}
    .modal-btn{width:100%;padding:.75rem;border:none;border-radius:var(--radius-sm);font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
    .modal-btn:hover{opacity:.85;}
    .modal-btn-all{background:var(--blue);color:#0a2040;}
    .modal-btn-month{background:var(--accent);color:#0a2e22;}
    .modal-btn-saving{background:#6366f1;color:#fff;}
    .modal-btn-cancel{background:var(--surface2);color:var(--muted);}
    .filter-bar{padding:.75rem 1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
    .filter-bar label{font-size:.82rem;color:var(--muted);white-space:nowrap;}
    .filter-bar input[type="month"]{flex:1;min-width:130px;padding:.5rem .75rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem;}
    .filter-bar input[type="month"]:focus{outline:none;border-color:var(--accent);}
    .btn-filter{padding:.5rem 1.1rem;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#0a2e22;font-weight:700;font-size:.85rem;cursor:pointer;white-space:nowrap;}
    .content{max-width:900px;margin:0 auto;padding:0 1rem;}
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;}
    @media(max-width:420px){.summary-grid{grid-template-columns:1fr;}}
    .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem .9rem;text-align:center;}
    .summary-card .label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem;}
    .summary-card .value{font-size:clamp(1rem,4vw,1.5rem);font-weight:700;line-height:1.2;word-break:break-all;}
    .value.green{color:var(--green);} .value.red{color:var(--red);} .value.blue{color:var(--blue);}
    .tab-bar{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.3rem;margin-bottom:1.25rem;gap:.3rem;}
    .tab-btn{flex:1;padding:.65rem;border:none;border-radius:10px;background:transparent;color:var(--muted);font-size:.88rem;font-weight:600;cursor:pointer;transition:background .2s,color .2s;}
    .tab-btn.active-income{background:rgba(0,212,160,.15);color:var(--green);}
    .tab-btn.active-expense{background:rgba(255,95,109,.15);color:var(--red);}
    .form-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;margin-bottom:1.25rem;display:none;}
    .form-panel.active{display:block;}
    .form-panel h2{font-size:1rem;font-weight:700;margin-bottom:1rem;}
    .income-panel h2{color:var(--green);} .expense-panel h2{color:var(--red);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem;}
    @media(max-width:480px){.form-row{grid-template-columns:1fr;}}
    .form-group{display:flex;flex-direction:column;gap:.3rem;}
    .form-group label{font-size:.78rem;color:var(--muted);font-weight:500;}
    .form-group input,.form-group select{padding:.65rem .8rem;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.95rem;width:100%;}
    .form-group select option{background:#1c1f27;}
    .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent);}
    .form-group.full{grid-column:1/-1;}
    .btn-submit{width:100%;margin-top:.25rem;padding:.8rem;border:none;border-radius:var(--radius-sm);font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;}
    .btn-submit:hover{opacity:.88;transform:translateY(-1px);}
    .btn-income{background:var(--green);color:#0a2e22;}
    .btn-expense{background:var(--red);color:#fff;}
    .tx-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;}
    .tx-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:.5rem;flex-wrap:wrap;}
    .tx-header h2{font-size:.95rem;font-weight:700;}
    .tx-month-badge{font-size:.78rem;color:var(--muted);background:var(--surface2);padding:.25rem .6rem;border-radius:20px;}
    .tx-list{list-style:none;}
    .tx-item{display:flex;align-items:center;gap:.75rem;padding:.85rem 0;border-bottom:1px solid var(--border);}
    .tx-item:last-child{border-bottom:none;}
    .tx-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
    .tx-icon.income{background:rgba(0,212,160,.12);color:var(--green);}
    .tx-icon.expense{background:rgba(255,95,109,.12);color:var(--red);}
    .tx-info{flex:1;min-width:0;}
    .tx-name{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .tx-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem;display:flex;gap:.4rem;flex-wrap:wrap;}
    .tx-cat{background:var(--surface2);padding:.1rem .45rem;border-radius:10px;font-size:.68rem;}
    .tx-amount{font-size:.92rem;font-weight:700;white-space:nowrap;flex-shrink:0;}
    .tx-amount.income{color:var(--green);} .tx-amount.expense{color:var(--red);}
    .tx-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s,color .2s;}
    .tx-delete:hover{background:rgba(255,95,109,.15);color:var(--red);}
    .tx-empty{text-align:center;color:var(--muted);padding:2rem 0;font-size:.9rem;font-style:italic;}
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);color:var(--text);padding:.7rem 1.4rem;border-radius:50px;font-size:.88rem;font-weight:600;border:1px solid var(--border);z-index:999;opacity:0;transition:transform .3s,opacity .3s;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
    .toast.success{border-color:var(--green);color:var(--green);}
    .toast.error{border-color:var(--red);color:var(--red);}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-row{text-align:center;padding:2rem 0;color:var(--muted);}
    footer{text-align:center;padding:1.5rem 1rem .5rem;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border);margin-top:1.5rem;}
  </style>
</head>
<body>

<header class="topbar">
  <h1>💰 Income &amp; Expense</h1>
  <div class="topbar-right">
    <a href="saving.html" class="btn-nav btn-saving">🏦 Saving</a>
    <button class="btn-nav btn-export" onclick="openExportModal()">⬇ SQL</button>
    <button class="btn-nav btn-logout" onclick="logout()">❌</button>
  </div>
</header>

<div class="modal-overlay" id="exportModal" onclick="closeExportModal(event)">
  <div class="modal">
    <h3>⬇ Export SQL</h3>
    <p>Choose what to export. Downloads a <code>.sql</code> file compatible with phpMyAdmin / MySQL.</p>
    <div class="modal-btns">
      <button class="modal-btn modal-btn-all"    onclick="exportSQL('all')">All Transactions</button>
      <button class="modal-btn modal-btn-month"  onclick="exportSQL('month')">This Month Only</button>
      <button class="modal-btn modal-btn-saving" onclick="exportSQL('saving')">Saving Table</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeExportModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="filter-bar">
  <label for="monthPicker">Month:</label>
  <input type="month" id="monthPicker" />
  <button class="btn-filter" onclick="loadData()">Filter</button>
</div>

<main class="content">
  <div class="summary-grid">
    <div class="summary-card"><div class="label">Income</div><div class="value green" id="totalIncome">—</div></div>
    <div class="summary-card"><div class="label">Expenses</div><div class="value red" id="totalExpenses">—</div></div>
    <div class="summary-card"><div class="label">Balance</div><div class="value blue" id="netBalance">—</div></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active-income" id="tabIncome"  onclick="switchTab('income')">＋ Income</button>
    <button class="tab-btn"               id="tabExpense" onclick="switchTab('expense')">－ Expense</button>
  </div>

  <div class="form-panel income-panel active" id="panelIncome">
    <h2>Add Income</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Income Type</label>
        <select id="incCategory">
          <option value="salary">Salary</option>
          <option value="freelance">Freelance</option>
          <option value="investment">Investment</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (Rs.)</label>
        <input type="number" id="incAmount" step="0.01" min="0.01" placeholder="0.00" />
      </div>
      <div class="form-group full">
        <label>Description</label>
        <input type="text" id="incDesc" placeholder="e.g. Monthly salary" />
      </div>
    </div>
    <button class="btn-submit btn-income" id="btnIncome" onclick="submitForm('income')">Add Income</button>
  </div>

  <div class="form-panel expense-panel" id="panelExpense">
    <h2>Add Expense</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Expense Type</label>
        <select id="expCategory">
          <option value="communication">Communication</option>
          <option value="groceries">Groceries</option>
          <option value="transport">Transport</option>
          <option value="Saving">Saving</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Amount (Rs.)</label>
        <input type="number" id="expAmount" step="0.01" min="0.01" placeholder="0.00" />
      </div>
      <div class="form-group full">
        <label>Description</label>
        <input type="text" id="expDesc" placeholder="e.g. Bus fare" />
      </div>
    </div>
    <button class="btn-submit btn-expense" id="btnExpense" onclick="submitForm('expense')">Add Expense</button>
  </div>

  <div class="tx-section">
    <div class="tx-header">
      <h2>Transactions</h2>
      <span class="tx-month-badge" id="txMonthLabel">—</span>
    </div>
    <ul class="tx-list" id="txList">
      <li class="loading-row"><span class="spinner"></span> Loading…</li>
    </ul>
  </div>
</main>

<footer>© All rights reserved. A product by <strong>Avishka Batapola</strong>.</footer>
<div class="toast" id="toast"></div>

  {id:83, description:'May saving',              amount:10000.00,  state:'saving',  month:'April', date:'2026-04-28', time:'23:48:34'}
];

var MONTH_NAMES = ['January','February','March','April','May','June',
                   'July','August','September','October','November','December'];

function monthNameFromYYYYMM(v) {
  if (!v) return null;
  var parts = v.split('-');
  return MONTH_NAMES[parseInt(parts[1], 10) - 1] || null;
}

function currentMonthName() {
  return MONTH_NAMES[new Date().getMonth()];
}

var _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('transactions')) {
        db.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('saving')) {
        db.createObjectStore('saving', { keyPath: 'id', autoIncrement: true });
      }
      if (!db.objectStoreNames.contains('meta')) {
        db.createObjectStore('meta', { keyPath: 'key' });
      }
    };

    req.onsuccess = function(e) {
      _db = e.target.result;
      seedIfNeeded().then(function() { resolve(_db); }).catch(function(err) { reject(err); });
    };

    req.onerror   = function() { reject(req.error); };
    req.onblocked = function() { reject(new Error('IDB blocked - please close other tabs')); };
  });
}

function seedIfNeeded() {
  return new Promise(function(resolve, reject) {
    // First check if already seeded (readonly tx)
    var checkTx  = _db.transaction('meta', 'readonly');
    var checkReq = checkTx.objectStore('meta').get('seeded');

    checkReq.onsuccess = function() {
      if (checkReq.result) { resolve(); return; }

      // Not seeded yet — write everything in one readwrite tx
      var tx = _db.transaction(['meta', 'transactions', 'saving'], 'readwrite');
      tx.oncomplete = function() { resolve(); };
      tx.onerror    = function() { reject(tx.error); };
      tx.onabort    = function() { reject(new Error('Seed transaction aborted')); };

      var txStore = tx.objectStore('transactions');
      var svStore = tx.objectStore('saving');

      SEED_TX.forEach(function(r) { txStore.put(r); });
      SEED_SV.forEach(function(r) { svStore.put(r); });
      tx.objectStore('meta').put({ key: 'seeded', value: true });
    };

    checkReq.onerror = function() { reject(checkReq.error); };
  });
}

function dbGetAll(storeName) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx  = db.transaction(storeName, 'readonly');
      var req = tx.objectStore(storeName).getAll();
      req.onsuccess = function() { resolve(req.result); };
      req.onerror   = function() { reject(req.error); };
    });
  });
}

// Use add() (not put()) so IDB generates a new key, never colliding with seeded ids
function dbAdd(storeName, record) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var r = {};
      Object.keys(record).forEach(function(k) { if (k !== 'id') r[k] = record[k]; });
      var tx  = db.transaction(storeName, 'readwrite');
      var req = tx.objectStore(storeName).add(r);
      var newId;
      req.onsuccess = function() { newId = req.result; };
      tx.oncomplete = function() { resolve(newId); };
      tx.onerror    = function() { reject(tx.error); };
      req.onerror   = function() { reject(req.error); };
    });
  });
}

function dbDelete(storeName, id) {
  return openDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx  = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror    = function() { reject(tx.error); };
    });
  });
}

// ── Transactions API ──────────────────────────────────────────────
var Transactions = {
  getByMonth: function(yyyymm) {
    var monthName = monthNameFromYYYYMM(yyyymm);
    return dbGetAll('transactions').then(function(all) {
      var filtered = monthName
        ? all.filter(function(t) { return t.month === monthName; })
        : all;
      filtered.sort(function(a,b) { return new Date(b.date) - new Date(a.date); });
      var inc = 0, exp = 0;
      filtered.forEach(function(t) {
        if (t.type === 'income') inc += parseFloat(t.amount);
        else                      exp += parseFloat(t.amount);
      });
      return {
        month:          monthName || 'All',
        total_income:   inc,
        total_expenses: exp,
        net_balance:    inc - exp,
        transactions:   filtered.map(function(t) {
          var copy = {};
          Object.keys(t).forEach(function(k) { copy[k] = t[k]; });
          copy.date = new Date(t.date).toLocaleDateString('en-CA');
          return copy;
        })
      };
    });
  },

  add: function(opts) {
    return dbAdd('transactions', {
      type:        opts.type,
      category:    opts.category,
      amount:      parseFloat(opts.amount),
      description: opts.description,
      date:        new Date().toISOString(),
      month:       monthNameFromYYYYMM(opts.month) || currentMonthName()
    });
  },

  delete: function(id) { return dbDelete('transactions', Number(id)); }
};

// ══════════════════════════════════════════════════════════════════
//  App logic
// ══════════════════════════════════════════════════════════════════
if (sessionStorage.getItem('ft_auth') !== 'true') {
  location.replace('login.html');
}

function fmt(n) {
  return 'Rs.' + parseFloat(n || 0).toLocaleString('en-US', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}

function currentMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type || 'success') + ' show';
  setTimeout(function() { t.className = 'toast'; }, 3000);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function logout() {
  if (!confirm('Log out?')) return;
  sessionStorage.clear();
  location.replace('login.html');
}

function switchTab(tab) {
  document.getElementById('tabIncome').className  = tab === 'income'  ? 'tab-btn active-income'  : 'tab-btn';
  document.getElementById('tabExpense').className = tab === 'expense' ? 'tab-btn active-expense' : 'tab-btn';
  document.getElementById('panelIncome').classList.toggle('active',  tab === 'income');
  document.getElementById('panelExpense').classList.toggle('active', tab === 'expense');
}

function loadData() {
  var month = document.getElementById('monthPicker').value || currentMonth();
  document.getElementById('txList').innerHTML =
    '<li class="loading-row"><span class="spinner"></span> Loading…</li>';

  Transactions.getByMonth(month).then(function(data) {
    document.getElementById('totalIncome').textContent   = fmt(data.total_income);
    document.getElementById('totalExpenses').textContent = fmt(data.total_expenses);
    document.getElementById('netBalance').textContent    = fmt(data.net_balance);
    document.getElementById('txMonthLabel').textContent  = data.month || '—';

    var list = document.getElementById('txList');

    if (!data.transactions || data.transactions.length === 0) {
      list.innerHTML = '<li class="tx-empty">No transactions this month.</li>';
      return;
    }

    list.innerHTML = data.transactions.map(function(tx) {
      var isInc = tx.type === 'income';
      return '<li class="tx-item">' +
        '<div class="tx-icon ' + tx.type + '">' + (isInc ? '↑' : '↓') + '</div>' +
        '<div class="tx-info">' +
          '<div class="tx-name">' + escHtml(tx.description) + '</div>' +
          '<div class="tx-meta"><span>' + escHtml(tx.date) + '</span>' +
          '<span class="tx-cat">' + escHtml(tx.category) + '</span></div>' +
        '</div>' +
        '<div class="tx-amount ' + tx.type + '">' + (isInc ? '+' : '−') + fmt(tx.amount) + '</div>' +
        '<button class="tx-delete" onclick="deleteTransaction(' + Number(tx.id) + ')" title="Delete">✕</button>' +
      '</li>';
    }).join('');

  }).catch(function(err) {
    document.getElementById('txList').innerHTML =
      '<li class="tx-empty">Error: ' + escHtml(err.message) + '</li>';
  });
}

function submitForm(type) {
  var category, amount, desc, btnId;
  if (type === 'income') {
    category = document.getElementById('incCategory').value;
    amount   = document.getElementById('incAmount').value;
    desc     = document.getElementById('incDesc').value.trim();
    btnId    = 'btnIncome';
  } else {
    category = document.getElementById('expCategory').value;
    amount   = document.getElementById('expAmount').value;
    desc     = document.getElementById('expDesc').value.trim();
    btnId    = 'btnExpense';
  }

  if (!desc)                              { showToast('Please enter a description.', 'error'); return; }
  if (!amount || parseFloat(amount) <= 0) { showToast('Enter a valid amount.', 'error'); return; }

  var month = document.getElementById('monthPicker').value || currentMonth();
  var btn   = document.getElementById(btnId);
  var orig  = btn.textContent;
  btn.disabled  = true;
  btn.innerHTML = '<span class="spinner"></span> Saving…';

  Transactions.add({ type: type, category: category, amount: amount,
                     description: desc, month: month })
    .then(function() {
      showToast('Transaction added!', 'success');
      if (type === 'income') {
        document.getElementById('incAmount').value = '';
        document.getElementById('incDesc').value   = '';
      } else {
        document.getElementById('expAmount').value = '';
        document.getElementById('expDesc').value   = '';
      }
      loadData();
    })
    .catch(function(err) {
      showToast('Error: ' + err.message, 'error');
    })
    .finally(function() {
      btn.disabled    = false;
      btn.textContent = orig;
    });
}

function deleteTransaction(id) {
  if (!confirm('Delete this transaction?')) return;
  Transactions.delete(id)
    .then(function() { showToast('Deleted.', 'success'); loadData(); })
    .catch(function(err) { showToast('Delete failed: ' + err.message, 'error'); });
}

// ── Export SQL ────────────────────────────────────────────────────
function openExportModal()  { document.getElementById('exportModal').classList.add('open'); }
function closeExportModal(e) {
  if (!e || e.target === document.getElementById('exportModal')) {
    document.getElementById('exportModal').classList.remove('open');
  }
}

function sqlEscape(val) {
  if (val === null || val === undefined) return 'NULL';
  return "'" + String(val).replace(/\\/g,'\\\\').replace(/'/g,"\\'") + "'";
}

function buildTransactionSQL(rows) {
  var now = new Date().toISOString().replace('T',' ').slice(0,19);
  var sql = '-- Finance Tracker SQL Export\n';
  sql += '-- Generated: ' + now + '\n';
  sql += '-- phpMyAdmin compatible\n\n';
  sql += 'SET SQL_MODE = "NO_AUTO_VALUE_ON_ZERO";\nSET AUTOCOMMIT = 0;\nSTART TRANSACTION;\n\n';
  sql += 'CREATE TABLE IF NOT EXISTS `transactions` (\n';
  sql += '  `id` int(11) NOT NULL AUTO_INCREMENT,\n';
  sql += '  `type` enum(\'income\',\'expense\') NOT NULL,\n';
  sql += '  `category` varchar(255) NOT NULL,\n';
  sql += '  `amount` decimal(10,2) NOT NULL,\n';
  sql += '  `description` text NOT NULL,\n';
  sql += '  `date` timestamp NULL DEFAULT current_timestamp(),\n';
  sql += '  `month` varchar(20) DEFAULT NULL,\n';
  sql += '  PRIMARY KEY (`id`)\n';
  sql += ') ENGINE=MyISAM DEFAULT CHARSET=latin1;\n\n';

  if (rows.length > 0) {
    sql += 'INSERT INTO `transactions` (`id`, `type`, `category`, `amount`, `description`, `date`, `month`) VALUES\n';
    sql += rows.map(function(r, i) {
      var dateStr = r.date ? r.date.replace('T',' ').slice(0,19) : '';
      return '(' + [
        Number(r.id),
        sqlEscape(r.type),
        sqlEscape(r.category),
        parseFloat(r.amount).toFixed(2),
        sqlEscape(r.description),
        sqlEscape(dateStr),
        sqlEscape(r.month)
      ].join(', ') + ')';
    }).join(',\n') + ';\n';
  }
  sql += '\nCOMMIT;\n';
  return sql;
}

function buildSavingSQL(rows) {
  var now = new Date().toISOString().replace('T',' ').slice(0,19);
  var sql = '-- Finance Tracker SQL Export (Saving Table)\n';
  sql += '-- Generated: ' + now + '\n\n';
  sql += 'SET SQL_MODE = "NO_AUTO_VALUE_ON_ZERO";\nSET AUTOCOMMIT = 0;\nSTART TRANSACTION;\n\n';
  sql += 'CREATE TABLE IF NOT EXISTS `saving` (\n';
  sql += '  `id` int(11) NOT NULL AUTO_INCREMENT,\n';
  sql += '  `description` varchar(255) DEFAULT NULL,\n';
  sql += '  `amount` decimal(10,2) DEFAULT NULL,\n';
  sql += '  `state` varchar(50) DEFAULT NULL,\n';
  sql += '  `month` varchar(20) DEFAULT NULL,\n';
  sql += '  `date` date DEFAULT NULL,\n';
  sql += '  `time` time DEFAULT NULL,\n';
  sql += '  PRIMARY KEY (`id`)\n';
  sql += ') ENGINE=MyISAM DEFAULT CHARSET=latin1;\n\n';

  if (rows.length > 0) {
    sql += 'INSERT INTO `saving` (`id`, `description`, `amount`, `state`, `month`, `date`, `time`) VALUES\n';
    sql += rows.map(function(r) {
      return '(' + [
        Number(r.id),
        sqlEscape(r.description),
        parseFloat(r.amount).toFixed(2),
        sqlEscape(r.state),
        sqlEscape(r.month),
        sqlEscape(r.date),
        sqlEscape(r.time || '00:00:00')
      ].join(', ') + ')';
    }).join(',\n') + ';\n';
  }
  sql += '\nCOMMIT;\n';
  return sql;
}

function downloadSQL(content, filename) {
  var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportSQL(mode) {
  closeExportModal();
  var monthName = monthNameFromYYYYMM(document.getElementById('monthPicker').value);

  if (mode === 'saving') {
    dbGetAll('saving').then(function(rows) {
      downloadSQL(buildSavingSQL(rows), 'saving_export.sql');
      showToast('Saving table exported!', 'success');
    }).catch(function(err) { showToast('Export failed: ' + err.message, 'error'); });
    return;
  }

  dbGetAll('transactions').then(function(rows) {
    var filtered = (mode === 'month' && monthName)
      ? rows.filter(function(r) { return r.month === monthName; })
      : rows;
    var fname = mode === 'month'
      ? 'transactions_' + (monthName || 'month').toLowerCase() + '.sql'
      : 'transactions_all.sql';
    downloadSQL(buildTransactionSQL(filtered), fname);
    showToast('Exported ' + filtered.length + ' records!', 'success');
  }).catch(function(err) { showToast('Export failed: ' + err.message, 'error'); });
}

// Init
document.getElementById('monthPicker').value = currentMonth();
loadData();
</script>
